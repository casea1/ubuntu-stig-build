---
# Installed by ansible-pull's galaxy step, or manually with:
#   ansible-galaxy install -r requirements.yml
#
# Both profiles now harden with Canonical's USG (`usg`), not the community
# ansible-lockdown role -- so there is no external Galaxy ROLE to pull anymore.
# (USG is an apt package installed via Ubuntu Pro by the usg_harden role.) Only
# the module collections the roles use are pinned here, for reproducible builds.

collections:
  - name: community.general # ini_file/ufw/modprobe/pamd (desktop_hardening, remote_desktop, ai_firewall, app_config)
    version: ">=8.0.0"     # floor; pin an exact version for a frozen gold image
  - name: ansible.posix    # local_accounts uses ansible.posix.acl for shared-folder ACLs
    version: ">=1.5.0"     # also bundled with the full `ansible` package
