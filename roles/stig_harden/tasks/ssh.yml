---
# =============================================================================
# stig_harden :: ssh.yml
# OpenSSH SERVER hardening — SSG/ComplianceAsCode stig profile (ubuntu2404).
#
# Pulled in from roles/stig_harden/tasks/main.yml via:
#   - ansible.builtin.include_tasks: ssh.yml
#
# WHY a drop-in instead of editing /etc/ssh/sshd_config in place:
#   Ubuntu 24.04's stock /etc/ssh/sshd_config begins with
#       Include /etc/ssh/sshd_config.d/*.conf
#   near the top, and sshd applies the FIRST matching keyword it sees. Because
#   the Include is high in the base file, a low-numbered drop-in (00-stig.conf)
#   is parsed before any later default, so our values win WITHOUT touching the
#   distro-managed base file (survives openssh-server upgrades cleanly). The SSG
#   oscap checks read the EFFECTIVE config (they evaluate the merged Include
#   tree), so a drop-in satisfies them.
#
# Rules satisfied here (SSG ubuntu2404 stig profile):
#   - sshd_disable_x11_forwarding   -> X11Forwarding no
#   - sshd_enable_pubkey_auth       -> PubkeyAuthentication yes
#   - sshd_enable_warning_banner    -> Banner /etc/issue.net
#   - (banner content)              -> /etc/issue.net holds the DCSA warning text
#
# SAFETY: nothing here can lock you out. PubkeyAuthentication yes does NOT turn
# off password login (this is a password-login box). The drop-in is `validate`d
# with `sshd -t` before it is moved into place, and service restarts go through
# the "restart ssh" handler (notify), never inline.
#
# NOTE: base_packages installed only openssh-CLIENT. The SSG SERVER controls
# still run, so we install openssh-server (idempotent) and harden it. If you
# never want inbound SSH on this desktop, mask ssh.service/ssh.socket as a
# separate deployment decision — the server package must still be present for
# the oscap server checks to evaluate.
# =============================================================================


# ---------------------------------------------------------------------------
# 1) Ensure the SSH SERVER is present (idempotent).
# ---------------------------------------------------------------------------
- name: "SSH | Install openssh-server (SSG evaluates the server-side controls)"
  # apt is a no-op once installed. cache_valid_time avoids a redundant index
  # refresh — base_packages already primed the apt cache earlier in this pull.
  ansible.builtin.apt:
    name: openssh-server
    state: present
    update_cache: true
    cache_valid_time: 3600


# ---------------------------------------------------------------------------
# 2) The SSH login banner FILE: /etc/issue.net (plain text, REAL newlines).
#    SSG's banner check expects the directive to point at /etc/issue.net and the
#    file to carry the approved DoD/DCSA Authorized Warning Banner. This must be
#    PLAIN TEXT with real line breaks — NOT the GVariant-escaped form GDM uses.
#
#    We REUSE the single source of truth `dcsa_gui_banner` (group_vars/all.yml),
#    which is stored on one physical line with literal `\n` GVariant escapes for
#    GDM. Here we convert those literal `\n` sequences into real newlines.
#
#    HOW the filter works (verified): in the Jinja expression below, the search
#    argument written as '\\n' is parsed by Jinja into the 2-char string
#    backslash+n (matching the literal escapes stored in the var), and the
#    replacement '\n' is parsed by Jinja into a single real LF. So the literal
#    `\n` in the var becomes a true line break. ansible.builtin.copy templates
#    `content`, so this renders once and is byte-stable on re-runs (idempotent).
#    The trailing "\n" gives the file a clean final newline.
# ---------------------------------------------------------------------------
- name: "SSH | Install the DCSA Authorized Warning Banner at /etc/issue.net"
  ansible.builtin.copy:
    dest: /etc/issue.net
    content: "{{ dcsa_gui_banner | replace('\\n', '\n') }}\n"
    owner: root
    group: root
    mode: "0644"          # world-readable: it is shown pre-auth, by design
  notify: restart ssh


# ---------------------------------------------------------------------------
# 3) The STIG SSH drop-in. ONE file, one key=value per line, deterministic
#    order so re-runs produce zero diff. `validate` runs `sshd -t` against the
#    staged temp copy BEFORE Ansible moves it into place, so a malformed
#    directive can never land and break sshd at next start.
# ---------------------------------------------------------------------------
- name: "SSH | Deploy the STIG OpenSSH drop-in (/etc/ssh/sshd_config.d/00-stig.conf)"
  ansible.builtin.copy:
    dest: /etc/ssh/sshd_config.d/00-stig.conf
    owner: root
    group: root
    mode: "0600"          # root-only: sshd config may reference key paths
    content: |
      # Managed by Ansible (stig_harden role, ssh.yml) — do not edit by hand.
      # Drop-in is Included first (00-) so these win over later defaults.

      # SSG sshd_disable_x11_forwarding: X11 forwarding tunnels GUI apps over the
      # SSH channel and widens the attack surface; desktop users do not need it.
      X11Forwarding {{ ssh_x11_forwarding }}

      # SSG sshd_enable_pubkey_auth: key-based auth must remain available even on
      # this password-login box (admins/automation may use keys). 'yes' is the
      # secure baseline the STIG expects; it does NOT disable password login.
      PubkeyAuthentication {{ ssh_pubkey_authentication }}

      # SSG sshd_enable_warning_banner: present the DoD/DCSA consent banner before
      # authentication. Points at the plain-text /etc/issue.net written above.
      Banner {{ ssh_banner_path }}
    validate: "/usr/sbin/sshd -t -f %s"
  notify: restart ssh
  # WHY validate with `sshd -t -f %s`: sshd parses the staged drop-in (as a
  # standalone config) and rejects a syntax error before Ansible installs the
  # file. Our three directives are syntactically valid standalone, so this is a
  # genuine guard. (It validates the drop-in itself, not the merged Include
  # tree — see risks for the recommended post-build `sshd -T` sanity check.)
