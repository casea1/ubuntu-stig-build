---
# ============================================================================
# PAM hardening: faillock lockout + faildelay + password-hashing rounds +
# empty-password prevention + last-logon notification.
# (The smartcard screen-lock dconf key is owned by gnome.yml -- see end of file.)
#
# WHY this file exists at all:
#   ansible-lockdown/UBUNTU24-STIG runs with ubtu24stig_disruption_high:false,
#   so its PAM-rewriting controls (faillock injection, pam_unix edits) are in
#   the SKIPPED set -> the SSG/oscap STIG profile (ubuntu2404) flags them. We
#   remediate them here, AFTER all package installs, surgically + idempotently.
#
# WHY this is the LAST safe place to touch PAM:
#   Roles run base_packages -> ... -> stig_harden, so by the time this runs all
#   apt/pip installs are done and tightening auth cannot break an install.
#
# SSG/oscap expectation (ComplianceAsCode, product ubuntu2404):
#   - faillock checks read VALUES from /etc/security/faillock.conf
#     (deny, fail_interval, unlock_time, audit, silent) -- NOT from inline
#     pam_faillock.so arguments. So tunables live in faillock.conf and the
#     common-auth/common-account faillock lines carry NO value args.
#   - pam_faillock.so must be ENGAGED in /etc/pam.d/common-auth (preauth +
#     authfail) and present in /etc/pam.d/common-account.
#   - pam_unix rounds= lives on the pam_unix line in /etc/pam.d/common-password
#     (Debian/Ubuntu equivalent of RHEL's password-auth).
#   - 'nullok' must be ABSENT from every pam_unix line (no_empty_passwords).
#   - faildelay via pam_faildelay.so delay= in common-auth.
#
# ----------------------------------------------------------------------------
# REVIEWER CORRECTIONS APPLIED (vs the first draft):
#   * community.general.pamd has NO parameter 'module_arguments_new' and NO
#     parameter 'module_path_to_match'. The first draft used both and would
#     have failed to even parse/run. Correct schema is:
#       anchor (EXISTING rule) = type + control + module_path
#       inserted (NEW rule)    = new_type + new_control + new_module_path
#                                + module_arguments (args go on the NEW rule)
#     Every pamd task below is rewritten to that schema.
#   * The anchor 'control' must equal the EXISTING rule's real control field.
#     On Ubuntu 24.04 the primary line in common-auth is:
#         auth  [success=1 default=ignore]  pam_unix.so nullok
#     so we anchor on control '[success=1 default=ignore]', NOT 'required' and
#     NOT the module name. The account line in common-account is:
#         account [success=1 new_authtok_reqd=done default=ignore] pam_unix.so
#   * pam_faillock 'authfail' is placed at the END of the auth stack (state:
#     after the LAST auth-deciding module) per ComplianceAsCode #4925 -- placing
#     it directly after pam_unix breaks SSSD/Kerberos; here we anchor it after
#     pam_permit/pam_deny tail so it tallies only real failures.
#   * pam_lastlog2.so is NOT shipped on Ubuntu 24.04 by default (util-linux
#     2.39 in noble; pam_lastlog2 needs >=2.40, and libpam-lastlog2 is not in
#     noble main). So we DETECT it and only wire it if present; otherwise POA&M.
#     We do NOT try to apt-install a package that does not exist in noble.
#
# CRITICAL SAFETY (do not break login):
#   We never remove pam_unix, never add even_deny_root, keep a working primary
#   auth at all times, and default unlock_time=0 (admin-unlock) -> root keeps a
#   recovery path. Validate on a snapshot before fielding (see risks).
# ============================================================================

# ----------------------------------------------------------------------------
# 0) Packages. pam_faillock / pam_faildelay ship in libpam-modules; pwquality
#    in libpam-pwquality. Installed idempotently (no-op if base_packages had
#    them). We deliberately do NOT list a lastlog2 package: it is absent from
#    noble main, so requesting it would fail the run.
# ----------------------------------------------------------------------------
- name: PAM | Ensure pam modules and pwquality are installed
  ansible.builtin.apt:
    name:
      - libpam-modules        # pam_faillock.so, pam_faildelay.so, pam_unix.so
      - libpam-pwquality      # pam_pwquality.so (used by other categories)
      - libpam-runtime        # pam-auth-update / common-* skeletons
    state: present
    update_cache: true
    cache_valid_time: 3600

# ----------------------------------------------------------------------------
# 1) faillock.conf -- SOURCE OF TRUTH for lockout tunables (SSG reads these).
#      deny          -> "Lock Accounts After Failed Password Attempts"
#      fail_interval -> "Set Interval For Counting Failed Password Attempts"
#      unlock_time   -> "Set Lockout Time for Failed Password Attempts"
#      audit         -> "Account Lockouts Must Be Logged"
#      silent        -> "Do Not Show System Messages When Unsuccessful Logon..."
#    A self-contained drop-in -> declarative + no re-run churn. We intentionally
#    omit 'even_deny_root' so root cannot be locked out (recovery path).
# ----------------------------------------------------------------------------
- name: PAM | Configure /etc/security/faillock.conf (lockout tunables SSG reads)
  ansible.builtin.copy:
    dest: /etc/security/faillock.conf
    owner: root
    group: root
    mode: "0644"
    content: |
      # Managed by stig_harden/pam.yml -- do not edit by hand.
      # Read by pam_faillock.so (engaged in common-auth/common-account).
      # The SSG/oscap STIG profile (ubuntu2404) reads these keys directly.

      # Lock the account after this many consecutive failed attempts.
      deny = {{ pam_faillock_deny }}

      # Window (seconds) over which the failures are counted.
      fail_interval = {{ pam_faillock_fail_interval }}

      # How long (seconds) an account stays locked. 0 = locked until an admin
      # runs `faillock --user <name> --reset` (STIG-preferred).
      unlock_time = {{ pam_faillock_unlock_time }}

      # Log every lockout to the audit trail ("Account Lockouts Must Be Logged").
      audit

      # Do not reveal the lockout state to unauthenticated users
      # ("Do Not Show System Messages When Unsuccessful Logon Attempts Occur").
      silent
  # No daemon to reload: PAM re-reads faillock.conf on each auth attempt.

# ----------------------------------------------------------------------------
# 2a) common-auth: pam_faillock 'preauth' BEFORE the primary pam_unix so it can
#     short-circuit an already-locked account. Anchor on the REAL control field
#     of the existing pam_unix line. 'required' for preauth is the SSG pattern.
#     pamd is idempotent here: if an identical preauth line already precedes
#     pam_unix it is a no-op.
# ----------------------------------------------------------------------------
- name: PAM | common-auth -- pam_faillock preauth BEFORE pam_unix
  community.general.pamd:
    name: common-auth
    type: auth
    control: "[success=1 default=ignore]"   # the real control on Ubuntu's pam_unix auth line
    module_path: pam_unix.so
    new_type: auth
    new_control: required
    new_module_path: pam_faillock.so
    module_arguments: preauth
    state: before

# ----------------------------------------------------------------------------
# 2b) common-auth: pam_faillock 'authfail' must run AFTER the auth-deciding
#     modules. Per ComplianceAsCode #4925, placing it right after pam_unix
#     breaks SSSD/Kerberos; the safe anchor is the tail pam_deny.so (the stack
#     terminator inserted by pam-auth-update). If no pam_deny tail exists we
#     fall back (2b-fallback) to anchoring after pam_unix, which is still
#     correct on a pam_unix-only desktop (this image is password-login only).
#     [default=die] rejects a failed/locked account immediately.
# ----------------------------------------------------------------------------
- name: PAM | common-auth -- detect tail pam_deny.so anchor
  ansible.builtin.command:
    cmd: grep -E '^auth\s+.*pam_deny\.so' /etc/pam.d/common-auth
  register: pam_auth_deny_tail
  changed_when: false
  failed_when: false

- name: PAM | common-auth -- pam_faillock authfail AFTER pam_deny tail (preferred)
  community.general.pamd:
    name: common-auth
    type: auth
    control: requisite
    module_path: pam_deny.so
    new_type: auth
    new_control: "[default=die]"
    new_module_path: pam_faillock.so
    module_arguments: authfail
    state: before        # before pam_deny -> after the real auth deciders
  when: pam_auth_deny_tail.rc == 0

- name: PAM | common-auth -- pam_faillock authfail AFTER pam_unix (fallback)
  community.general.pamd:
    name: common-auth
    type: auth
    control: "[success=1 default=ignore]"
    module_path: pam_unix.so
    new_type: auth
    new_control: "[default=die]"
    new_module_path: pam_faillock.so
    module_arguments: authfail
    state: after
  when: pam_auth_deny_tail.rc != 0

# ----------------------------------------------------------------------------
# 2c) common-auth: pam_faillock 'authsucc' clears the tally on a clean login so
#     legitimate users don't accumulate stale failures. 'sufficient' is safe --
#     it only runs after an auth deciders already succeeded. Anchor it AFTER the
#     authfail line we just inserted.
# ----------------------------------------------------------------------------
- name: PAM | common-auth -- pam_faillock authsucc after the authfail line
  community.general.pamd:
    name: common-auth
    type: auth
    control: "[default=die]"
    module_path: pam_faillock.so
    new_type: auth
    new_control: sufficient
    new_module_path: pam_faillock.so
    module_arguments: authsucc
    state: after

# ----------------------------------------------------------------------------
# 3) common-account: add an 'account required pam_faillock.so' line so the
#    account phase also consults the tally (SSG checks for its presence). Anchor
#    on the REAL control of the account pam_unix line and insert BEFORE it.
# ----------------------------------------------------------------------------
- name: PAM | common-account -- add pam_faillock account line
  community.general.pamd:
    name: common-account
    type: account
    control: "[success=1 new_authtok_reqd=done default=ignore]"
    module_path: pam_unix.so
    new_type: account
    new_control: required
    new_module_path: pam_faillock.so
    state: before

# ----------------------------------------------------------------------------
# 4) "Enforce Delay After Failed Logon Attempts".
#    SSG ubuntu2404 satisfies this with pam_faildelay.so delay=<usec> in
#    common-auth (delay is MICROSECONDS; 4s = 4000000). Insert it BEFORE the
#    faillock preauth line so the delay always applies. Anchor on the preauth
#    line we added in 2a.
# ----------------------------------------------------------------------------
- name: PAM | common-auth -- enforce pam_faildelay (delay after failed logon)
  community.general.pamd:
    name: common-auth
    type: auth
    control: required
    module_path: pam_faillock.so          # matches the preauth line (control 'required')
    module_arguments: preauth             # disambiguates from any other faillock line
    new_type: auth
    new_control: required
    new_module_path: pam_faildelay.so
    state: before
    # NOTE: module_arguments here ALSO names the args of the matched rule for
    # disambiguation; the inserted pam_faildelay carries its own delay via the
    # follow-up args_present task below (pamd applies module_arguments to the
    # NEW rule on insert, so we set delay in one place to stay idempotent).

- name: PAM | common-auth -- ensure pam_faildelay carries delay=<usec>
  community.general.pamd:
    name: common-auth
    type: auth
    control: required
    module_path: pam_faildelay.so
    module_arguments: "delay={{ pam_faildelay_delay_usec }}"
    state: args_present
  # args_present is idempotent: adds delay= only if missing, never duplicates.

# ----------------------------------------------------------------------------
# 5) "Prevent Login to Accounts With Empty Password" -> strip 'nullok' from any
#    pam_unix.so line in BOTH common-auth and common-password. Surgical regex:
#    removes only the nullok token (and its leading whitespace), never the line.
#    replace is idempotent.
# ----------------------------------------------------------------------------
- name: PAM | Remove 'nullok' from pam_unix (no empty-password logins)
  ansible.builtin.replace:
    path: "/etc/pam.d/{{ item }}"
    regexp: '(\s+)nullok(_secure)?\b'
    replace: ''
  loop:
    - common-auth
    - common-password

# ----------------------------------------------------------------------------
# 6) "Set number of Password Hashing Rounds - password-auth".
#    Ubuntu's RHEL-style "password-auth" maps to /etc/pam.d/common-password.
#    Ensure the pam_unix.so password line carries rounds=<N>. Two idempotent
#    steps: (a) normalize an existing rounds= value; (b) append rounds= if the
#    pam_unix password line has none.
# ----------------------------------------------------------------------------
- name: PAM | common-password -- normalize existing rounds= if present
  ansible.builtin.replace:
    path: /etc/pam.d/common-password
    regexp: '^(password\s+.*\bpam_unix\.so\b.*?)\brounds=\d+\b'
    replace: '\1rounds={{ pam_unix_rounds }}'

- name: PAM | common-password -- add rounds= to pam_unix line if missing
  ansible.builtin.lineinfile:
    path: /etc/pam.d/common-password
    backrefs: true
    # Match a pam_unix password line WITHOUT rounds= and append it.
    regexp: '^(password\s+.*\bpam_unix\.so\b(?!.*\brounds=).*)$'
    line: '\1 rounds={{ pam_unix_rounds }}'
  # backrefs+regexp => no match (thus no-op) once rounds= is present: idempotent.

# ----------------------------------------------------------------------------
# 7) "Ensure PAM Displays Last Logon/Access Notification".
#    Ubuntu 24.04 REMOVED pam_lastlog.so (shadow 1.5.3 dropped it) and the
#    replacement pam_lastlog2.so is NOT in noble by default (needs util-linux
#    >= 2.40; noble ships 2.39, and libpam-lastlog2 is not in noble main).
#    So we DETECT the module and only wire it if it actually exists; otherwise
#    we emit a POA&M warning (cannot remediate offline on stock noble).
# ----------------------------------------------------------------------------
- name: PAM | Detect pam_lastlog2.so availability (24.04 dropped pam_lastlog)
  ansible.builtin.find:
    paths:
      - /usr/lib/x86_64-linux-gnu/security
      - /usr/lib/security
    patterns: pam_lastlog2.so
    file_type: any
  register: pam_lastlog2_present

- name: PAM | common-session -- show last logon / failed attempts (pam_lastlog2)
  community.general.pamd:
    name: common-session
    type: session
    control: optional
    module_path: pam_unix.so
    new_type: session
    new_control: optional
    new_module_path: pam_lastlog2.so
    module_arguments: showfailed
    state: after
  when: pam_lastlog2_present.matched | int > 0

- name: PAM | WARN if no lastlog PAM module is available (POA&M this rule)
  ansible.builtin.debug:
    msg: >-
      pam_lastlog2.so not found on this image. "Ensure PAM Displays Last Logon/
      Access Notification" cannot be auto-remediated on stock Ubuntu 24.04
      (pam_lastlog removed; pam_lastlog2 not in noble) and must be carried as a
      documented POA&M, OR backport libpam-lastlog2 into the build mirror.
  when: pam_lastlog2_present.matched | int == 0

# ----------------------------------------------------------------------------
# 8) (Smartcard screen-lock dconf key is owned by gnome.yml.)
#    The one smartcard-adjacent control we satisfy on this password-only image,
#    'dconf_gnome_lock_screen_on_smartcard_removal', is set + locked in
#    tasks/gnome.yml (the 00-stig-gnome keyfile) alongside the rest of the GNOME
#    dconf hardening, so there is a single source of truth for every dconf key.
#    Nothing to do here -- this note just records WHY pam.yml does not touch it.
# ----------------------------------------------------------------------------
