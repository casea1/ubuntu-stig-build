---
# =============================================================================
# stig_harden :: filesystem.yml
# File permissions, sysctl, journal perms, and clock (RTC -> UTC).
#
# Pulled in from roles/stig_harden/tasks/main.yml via:
#   - ansible.builtin.include_tasks: filesystem.yml
#
# WHY post-install is safe: this runs in the stig_harden role, AFTER every
# package-install role (base_packages -> app_config -> dev_tools). Tightening
# /lib, /usr/lib, /var/log and journal perms only AFTER all packages are laid
# down means we don't fight dpkg over freshly-unpacked files. None of these
# edits touch PAM, the boot chain, or the GNOME session, so there is no
# lock-out / brick risk in this file.
#
# SSG note: the compliance scan is ComplianceAsCode/SSG
# (xccdf_org.ssgproject.content_profile_stig for ubuntu2404). Each block below
# is written to satisfy the actual oscap *check*, not merely "set it somewhere".
# The expected owner/group/mode values were cross-checked against the DISA
# Ubuntu 24.04 STIG (V1R1) findings that the SSG OVAL mirrors:
#   UBTU-24-300009  library files group-owned by root
#   UBTU-24-600140  kernel.dmesg_restrict = 1
#   UBTU-24-700030/040/050  journalctl mode 740, owner root, group root
#   UBTU-24-700060..090     journal dirs/files root:systemd-journal, dir 2640
#   UBTU-24-700100..120     /var/log dir group syslog, owner root, mode <=0755
#   UBTU-24-700150          /var/log files mode <=0640
#   UBTU-24-901220          RTC mapped to UTC
# =============================================================================


# -----------------------------------------------------------------------------
# 1) RESTRICT ACCESS TO KERNEL MESSAGE BUFFER  --  kernel.dmesg_restrict=1
#    SSG rule:
#      - sysctl_kernel_dmesg_restrict   (STIG UBTU-24-600140)
#        ("Restrict Access to Kernel Message Buffer")
#    The oscap check has TWO parts: (a) the *runtime* value reported by
#    `sysctl kernel.dmesg_restrict` must be 1, AND (b) a matching token must be
#    present in a sysctl config file (/etc/sysctl.conf or /etc/sysctl.d/*.conf)
#    with NO conflicting lower-precedence value elsewhere. ansible.builtin.sysctl
#    with sysctl_file + reload satisfies both: it writes the drop-in AND applies
#    the live value, and is a no-op once both already match.
#
#    NOTE on "no conflicting config": SSG/STIG fails if another file sets a
#    DIFFERENT value. Ubuntu ships kernel.dmesg_restrict=1 by default in
#    /usr/lib/sysctl.d/50-default.conf, so we are reinforcing, not conflicting.
#    Our drop-in is numbered 10- (low) but the VALUE matches the default (1), so
#    precedence is irrelevant here.
# -----------------------------------------------------------------------------
- name: "FS | Restrict kernel message buffer (sysctl kernel.dmesg_restrict=1)"
  ansible.builtin.sysctl:
    name: kernel.dmesg_restrict
    value: "{{ stig_kernel_dmesg_restrict }}"
    sysctl_file: /etc/sysctl.d/10-stig-kernel.conf
    sysctl_set: true        # also push the value into the running kernel now
    state: present
    reload: true            # `sysctl -p <file>` so runtime + persisted agree
  # Drop-in (not /etc/sysctl.conf in place) per our 'prefer drop-in' standard;
  # SSG accepts any file under /etc/sysctl.d/. This is the only sysctl in the
  # filesystem category -- other categories own their own *.conf drop-ins.


# -----------------------------------------------------------------------------
# 2) SYSTEM-WIDE LIBRARY FILES GROUP-OWNED BY root
#    SSG rule:
#      - root_permissions_syslibrary_files   (STIG UBTU-24-300009)
#        ("Verify the system-wide library files in directories /lib /lib64
#          /usr/lib /usr/lib64 are group-owned by root")
#    The DISA/SSG CHECK is exactly:
#        find -L /lib /usr/lib /lib64 ! -group root -type f
#    i.e. it inspects only REGULAR FILES (-type f), following symlinks (-L),
#    and FAILS on any whose group is not root (gid 0). We mirror that check
#    predicate-for-predicate so our remediation set == the scanner's audit set.
#
#    WHY shell find+chgrp (not ansible.builtin.file): file: cannot recurse
#    across these huge trees efficiently, and recurse:true would also rewrite
#    OWNER/MODE which we must NOT touch (mode of libs must stay as shipped). We
#    only ever change the GROUP, and only on regular files that are not already
#    root, so the command is a true no-op once compliant. changed_when reflects
#    whether find actually printed (i.e. chgrp'd) anything.
#    NOTE: /lib and /lib64 on Ubuntu 24.04 are usrmerge symlinks into /usr/lib*;
#    -L resolves them so we cover the real trees (matching the STIG check), and
#    -type f means we never chgrp a symlink itself or a directory -- only files.
# -----------------------------------------------------------------------------
- name: "FS | Re-group-own system library files to root (SSG root_permissions_syslibrary_files)"
  ansible.builtin.shell: >-
    set -o pipefail;
    found=0;
    for d in /lib /lib64 /usr/lib /usr/lib64; do
      [ -e "$d" ] || continue;
      out=$(find -L "$d" -type f ! -group root -print 2>/dev/null);
      if [ -n "$out" ]; then
        printf '%s\n' "$out" | xargs -r chgrp root;
        found=1;
      fi;
    done;
    echo "changed=$found"
  args:
    executable: /bin/bash
  register: stig_lib_group_fix
  changed_when: "'changed=1' in stig_lib_group_fix.stdout"
  # Idempotent: on a compliant box `find -type f ! -group root` prints nothing,
  # no chgrp runs, and changed_when evaluates false -> zero churn. We deliberately
  # do not alter owner or mode here (the rule only checks GROUP, and touching
  # mode/owner of shared libs could break the loader or vendor libs).


# -----------------------------------------------------------------------------
# 3) /var/log DIRECTORY ITSELF -- group=syslog, owner=root, mode <=0755
#    SSG rules / STIG IDs:
#      - UBTU-24-700100  /var/log directory group-owned by 'syslog'
#      - UBTU-24-700110  /var/log directory owned by 'root'
#      - UBTU-24-700120  /var/log directory mode '0755' or less permissive
#    CRITICAL: on Ubuntu /var/log is shipped root:SYSLOG (NOT root:root). The
#    SSG STIG check explicitly requires group 'syslog' on the /var/log directory.
#    We therefore set the directory's group to syslog (NOT root) and only tighten
#    its mode to {{ stig_var_log_dir_mode }} (0750, which is <= the 0755 cap).
#    This task MUST run before the recursive group-normalisation below, and the
#    recursive task is written to LEAVE 'syslog' alone, so we never undo this.
# -----------------------------------------------------------------------------
- name: "FS | Set /var/log directory itself to root:syslog mode {{ stig_var_log_dir_mode }} (SSG UBTU-24-700100/110/120)"
  ansible.builtin.file:
    path: /var/log
    state: directory
    owner: root
    group: "{{ stig_var_log_group }}"     # 'syslog' -- required by the STIG check
    mode: "{{ stig_var_log_dir_mode }}"   # 0750, which is <= the SSG 0755 cap
    recurse: false                        # ONLY the top dir; contents handled below
  # group 'syslog' exists once rsyslog is installed (base_packages installs
  # rsyslog). ansible.builtin.file is idempotent on this single path: it reports
  # changed only if owner/group/mode currently differ.


# -----------------------------------------------------------------------------
# 4) PERMISSIONS ON FILES / DIRS *WITHIN* /var/log
#    SSG rules / STIG IDs:
#      - UBTU-24-700150  log files (e.g. /var/log/syslog) mode '0640' or less
#      - file_permissions_var_log / dir_permissions_var_log family
#    SSG FAILS on any regular file > 0640 or any dir > 0755 under /var/log. We
#    normalize, but ONLY downgrade over-permissive entries so re-runs don't churn:
#       - directories -> {{ stig_var_log_dir_mode }} (0750, <=0755)
#       - files       -> {{ stig_var_log_file_mode }} (0640, <=0640)
#       - owner       -> root (everything)
#       - group       -> repaired ONLY when it is none of the SSG/Ubuntu-accepted
#                        groups (root, adm, syslog, systemd-journal); those four
#                        are left intact so we never break /var/log (syslog),
#                        /var/log/syslog (adm), or journald (systemd-journal).
#
#    WHY guarded `find` (not file: recurse): we must apply DIFFERENT modes to
#    dirs vs files, only DOWNGRADE offenders, and avoid churn. find with a
#    permission predicate selects only the offenders, so on a compliant box
#    nothing is touched and changed_when is false.
# -----------------------------------------------------------------------------
- name: "FS | Tighten over-permissive DIRECTORIES under /var/log to {{ stig_var_log_dir_mode }} (SSG dir_permissions_var_log)"
  ansible.builtin.shell: >-
    set -o pipefail;
    out=$(find /var/log -xdev -mindepth 1 -type d -perm /027 -print 2>/dev/null);
    if [ -n "$out" ]; then
      printf '%s\n' "$out" | xargs -r chmod {{ stig_var_log_dir_mode }};
      echo changed;
    fi
  args:
    executable: /bin/bash
  register: stig_varlog_dirs
  changed_when: "'changed' in stig_varlog_dirs.stdout"
  # -mindepth 1 so we do NOT re-touch /var/log itself (handled in task 3 with the
  # correct syslog group). -perm /027 selects any sub-dir granting group-write or
  # ANY 'other' bit (i.e. looser than 0750) -- exactly what SSG flags (> 0755).

- name: "FS | Tighten over-permissive FILES under /var/log to {{ stig_var_log_file_mode }} (SSG file_permissions_var_log)"
  ansible.builtin.shell: >-
    set -o pipefail;
    out=$(find /var/log -xdev -type f -perm /137 -print 2>/dev/null);
    if [ -n "$out" ]; then
      printf '%s\n' "$out" | xargs -r chmod {{ stig_var_log_file_mode }};
      echo changed;
    fi
  args:
    executable: /bin/bash
  register: stig_varlog_files
  changed_when: "'changed' in stig_varlog_files.stdout"
  # -perm /137 selects any regular log file that is group-writable, or has ANY
  # execute bit, or ANY 'other' permission -- i.e. anything looser than 0640,
  # which is precisely what the SSG file rule flags. Compliant 0640/0600 files
  # match none of those bits and are left untouched (idempotent).

- name: "FS | Force OWNER=root on everything under /var/log (SSG file_ownership_var_log)"
  ansible.builtin.shell: >-
    set -o pipefail;
    out=$(find /var/log -xdev -mindepth 1 ! -user root -print 2>/dev/null);
    if [ -n "$out" ]; then
      printf '%s\n' "$out" | xargs -r chown root;
      echo changed;
    fi
  args:
    executable: /bin/bash
  register: stig_varlog_owner
  changed_when: "'changed' in stig_varlog_owner.stdout"
  # Owner must be root for the SSG ownership rule. -mindepth 1 leaves /var/log
  # itself to task 3. We only chown entries NOT already root-owned -> no-op on a
  # clean box. GROUP is handled next (we preserve the SSG-accepted set and only
  # fix the rest).

- name: "FS | Reset GROUP under /var/log only where it is NOT in the SSG-accepted set (root/adm/syslog/systemd-journal)"
  ansible.builtin.shell: >-
    set -o pipefail;
    out=$(find /var/log -xdev -mindepth 1
      ! -group root ! -group adm ! -group syslog ! -group systemd-journal
      -print 2>/dev/null);
    if [ -n "$out" ]; then
      printf '%s\n' "$out" | xargs -r chgrp root;
      echo changed;
    fi
  args:
    executable: /bin/bash
  register: stig_varlog_group
  changed_when: "'changed' in stig_varlog_group.stdout"
  # SSG/Ubuntu legitimately use group 'syslog' (/var/log), 'adm' (/var/log/syslog
  # and rotated logs), 'systemd-journal' (journald, owned by task 5), and 'root'.
  # We leave all four alone and only repair groups that are NONE of those,
  # avoiding churn and -- crucially -- NOT stomping the syslog/adm groups the
  # STIG actually mandates. -mindepth 1 protects /var/log's own syslog group.


# -----------------------------------------------------------------------------
# 5) PERMISSIONS ON THE SYSTEM JOURNAL DIRECTORIES AND FILES
#    SSG rules / STIG IDs:
#      - UBTU-24-700060  journal DIRS group-owned by systemd-journal
#      - UBTU-24-700080  journal DIRS owned by root
#      - UBTU-24-700070  journal FILES group-owned by systemd-journal
#      - UBTU-24-700090  journal FILES owned by root
#      - directory_permissions_var_log_journal / file_permissions_var_log_journal
#    The journal lives under /var/log/journal (persistent) and /run/log/journal
#    (volatile). The DISA fix sets the journal DIRECTORIES to mode 2640 (setgid,
#    so new journal files inherit the systemd-journal group), owner root, group
#    systemd-journal; and the journal FILES to 0640 root:systemd-journal.
#    SSG's OVAL checks "2640 or less permissive" for the dirs -- so we use 2640
#    exactly (the STIG fix value). NOTE: 2750 would FAIL the Ubuntu STIG, because
#    2750 grants group-execute (x) that 2640 does not, i.e. 2750 is MORE
#    permissive than 2640 -- hence the default below is 2640, not 2750.
#    Both paths may be absent on a given image (no persistent journal yet, or no
#    volatile dir at scan time) so we guard with stat/`when`.
# -----------------------------------------------------------------------------
- name: "FS | Stat the journal directories (may be absent on a fresh image)"
  ansible.builtin.stat:
    path: "{{ item }}"
  loop:
    - /var/log/journal
    - /run/log/journal
  register: stig_journal_dirs

- name: "FS | Set journal DIRECTORY perms {{ stig_journal_dir_mode }} root:systemd-journal (SSG directory_permissions_var_log_journal)"
  ansible.builtin.file:
    path: "{{ item.item }}"
    state: directory
    owner: root
    group: systemd-journal
    mode: "{{ stig_journal_dir_mode }}"   # 2640: setgid + rwxr----- (STIG fix value)
    recurse: false                         # top dir only; files handled below
  loop: "{{ stig_journal_dirs.results }}"
  loop_control:
    label: "{{ item.item }}"
  when: item.stat.exists and item.stat.isdir
  # Only run for paths that actually exist (when:), so absent /run/log/journal on
  # a freshly-imaged box does not error. setgid (2) is what SSG checks AND is
  # functionally required so journald's new files inherit systemd-journal. The
  # systemd-journal group always exists on Ubuntu 24.04 (systemd is present).
  #
  # NOTE on persistence: systemd-tmpfiles re-asserts these perms from
  # /usr/lib/tmpfiles.d/systemd.conf on each boot. The shipped Ubuntu tmpfiles
  # entry already uses 2640 root systemd-journal, so our setting agrees with it
  # and will NOT be reverted to a non-compliant value on reboot. (If a future
  # Ubuntu changes that default, the tmpfiles drop-in must be revisited -- see
  # risks.)

- name: "FS | Set journal FILE perms 0640 root:systemd-journal (SSG file_permissions_var_log_journal)"
  ansible.builtin.shell: >-
    set -o pipefail;
    changed=0;
    for base in /var/log/journal /run/log/journal; do
      [ -d "$base" ] || continue;
      out=$(find "$base" -xdev -type f \( ! -perm 640 -o ! -group systemd-journal -o ! -user root \) -print 2>/dev/null);
      if [ -n "$out" ]; then
        printf '%s\n' "$out" | xargs -r -I{} sh -c 'chown root:systemd-journal "$1"; chmod 0640 "$1"' _ {};
        changed=1;
      fi;
    done;
    echo "changed=$changed"
  args:
    executable: /bin/bash
  register: stig_journal_files
  changed_when: "'changed=1' in stig_journal_files.stdout"
  # The journal files (system.journal, user-*.journal, etc.) must be 0640
  # root:systemd-journal. find selects only files off-spec on mode OR group OR
  # owner, so a compliant journal is a no-op. We loop both the persistent and
  # volatile trees; missing dirs are skipped by the `[ -d ]` guard.


# -----------------------------------------------------------------------------
# 6) PERMISSIONS ON THE journalctl COMMAND
#    SSG rules / STIG IDs:
#      - UBTU-24-700030  /usr/bin/journalctl not accessible by unauthorized users
#      - UBTU-24-700040  /usr/bin/journalctl owned by root
#      - UBTU-24-700050  /usr/bin/journalctl group-owned by root
#    DISA fix is exactly `chmod 740 /usr/bin/journalctl`; SSG OVAL checks mode
#    0740 (rwxr-----), owner root, group root. Ubuntu ships it 0755, so this is
#    normally a real (one-time) change.
# -----------------------------------------------------------------------------
- name: "FS | Restrict /usr/bin/journalctl to {{ stig_journalctl_mode }} root:root (SSG file_permissions_journalctl)"
  ansible.builtin.file:
    path: /usr/bin/journalctl
    owner: root
    group: root
    mode: "{{ stig_journalctl_mode }}"   # 0740 per DISA fix (chmod 740)
  # ansible.builtin.file is fully idempotent on a single known path -- it only
  # changes (and reports changed) if owner/group/mode currently differ. No
  # recursion, no guard needed: journalctl always exists on Ubuntu 24.04.


# -----------------------------------------------------------------------------
# 7) REAL-TIME CLOCK SET TO UTC
#    SSG rule / STIG ID:
#      - clock_correct_local_rtc   (UBTU-24-901220, "timestamps mappable to UTC")
#        ("Ensure real-time clock is set to UTC")
#    The oscap check inspects /etc/adjtime: it must NOT contain the token 'LOCAL'
#    (the third line must read 'UTC', or the file may be absent which also means
#    UTC). `timedatectl set-local-rtc 0` flips the hardware clock to UTC and
#    rewrites /etc/adjtime accordingly.
#
#    WHY a guarded command (idempotent): we first read state with
#    `timedatectl show -p LocalRTC --value`. If it already reports 'no' (RTC in
#    UTC) we skip the set entirely, so re-runs are a true no-op and we never
#    rewrite /etc/adjtime needlessly.
# -----------------------------------------------------------------------------
- name: "FS | Query whether the RTC is currently in local time"
  ansible.builtin.command: timedatectl show -p LocalRTC --value
  register: stig_local_rtc
  changed_when: false        # read-only probe, never a change
  check_mode: false          # must run even in --check so the next task can gate

- name: "FS | Set hardware clock to UTC (SSG clock_correct_local_rtc)"
  ansible.builtin.command: timedatectl set-local-rtc 0
  when: stig_local_rtc.stdout | trim != 'no'
  changed_when: true
  # LocalRTC=yes means the RTC is in local time -> we flip it to UTC
  # (set-local-rtc 0), which also writes 'UTC' into /etc/adjtime, satisfying the
  # SSG /etc/adjtime check. When already 'no' (UTC) the when: short-circuits and
  # nothing runs.
