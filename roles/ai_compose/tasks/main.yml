---
# =============================================================================
# ai_compose -- stage the AI stack into {{ ai_compose_dir }} (default
# /opt/it/docker) for the node's role. It: places the consolidated
# docker-compose.yaml; builds the custom images the stack needs (oikb/hfcli/
# repomix, not on any registry); renders a root-only .env (auto-generated DB +
# WebUI secrets) and the oikb config skeleton; creates the external named
# volumes; and OPTIONALLY fetches models + brings the stack up.
#
# Gated is_ai + ai_compose_enabled in local.yml. The node's role (system1 |
# system2) is auto-derived from the hostname (see group_vars).
#
# HOST-PREP-FRIENDLY: by default it PLACES files + builds images + creates the
# (empty) volumes, but does NOT `up` (ai_compose_deploy=false), because System
# 1's vLLM volume must be populated with the model first (see OPERATIONS.md).
# Flip ai_compose_deploy=true once the model is staged to have Ansible run it.
# =============================================================================

- name: "AI-COMPOSE | Validate ai_node_role (auto-derived from hostname)"
  ansible.builtin.assert:
    that:
      - ai_node_role in ['system1', 'system2']
    fail_msg: >-
      Could not auto-select an AI node role for hostname '{{ ansible_hostname }}'
      (got '{{ ai_node_role | default("") | trim }}'). Name the box dev-ai1/dev-ai2,
      add it to ai_node_role_by_hostname, or set ai_node_role: system1|system2 in
      this node's /etc/stig-build/site.yml.
    quiet: true

- name: "AI-COMPOSE | Ensure the compose dir exists ({{ ai_compose_dir }})"
  ansible.builtin.file:
    path: "{{ ai_compose_dir }}"
    state: directory
    owner: root
    group: "{{ ia_it_group | default('sudo') }}"
    mode: "2750"          # admins (sudo group) can read/manage; others denied

- name: "AI-COMPOSE | Place the compose file for role {{ ai_node_role }}"
  ansible.builtin.copy:
    src: "{{ ai_node_role }}-compose.yaml"
    dest: "{{ ai_compose_dir }}/docker-compose.yaml"
    owner: root
    group: "{{ ia_it_group | default('sudo') }}"
    mode: "0640"

- name: "AI-COMPOSE | Resolve the peer node via /etc/hosts (only when its addr is an IP)"
  # Hands-off cross-node name resolution: if this node's peer address is an IP (set
  # in site.yml as ai_system2_addr / ai_system1_addr), map the peer's canonical
  # hostname -> that IP in the HOST's /etc/hosts, so admin tooling on the box resolves
  # it with no DNS. (Containers get the same mapping via extra_hosts from .env; the
  # host file does not reach into containers.) Skipped when the addr is already a name.
  ansible.builtin.lineinfile:
    path: /etc/hosts
    regexp: '^[0-9.]+[[:space:]]+{{ _ai_peer_host }}[[:space:]]*$'
    line: "{{ _ai_peer_addr }} {{ _ai_peer_host }}"
    state: present
  vars:
    _ai_peer_host: "{{ 'dev-ai2' if ai_node_role == 'system1' else 'dev-ai1' }}"
    _ai_peer_addr: "{{ ai_system2_addr if ai_node_role == 'system1' else ai_system1_addr }}"
  when:
    - ai_hosts_manage | default(true) | bool
    - (_ai_peer_addr | default('')) | length > 0
    - (_ai_peer_addr | string)[0] in '0123456789'

- name: "AI-COMPOSE | Drop the non-FIPS override file for inference containers"
  # The host runs FIPS (kernel fips_enabled=1), but the vLLM image ships no FIPS
  # OpenSSL provider, so its DRBG can't init and the container crash-loops
  # (fips.so not found / FATAL FIPS SELFTEST). vLLM/PyTorch aren't FIPS-validated
  # anyway, so vLLM services bind-mount THIS file (content "0") over
  # /proc/sys/crypto/fips_enabled and use standard crypto. The HOST stays FIPS.
  ansible.builtin.copy:
    content: "0\n"
    dest: "{{ ai_compose_dir }}/fips_off"
    owner: root
    group: "{{ ia_it_group | default('sudo') }}"
    mode: "0644"

- name: "AI-COMPOSE | Place the chat-model switch script (System 1)"
  # System 1 alternates gpt-oss-120b <-> Granite-4.1-30b (only one fits in VRAM).
  ansible.builtin.copy:
    src: switch-model.sh
    dest: "{{ ai_compose_dir }}/switch-model.sh"
    owner: root
    group: "{{ ia_it_group | default('sudo') }}"
    mode: "0750"
  when: ai_node_role == 'system1'

# ---- Custom images (not on a registry) -> built on the box ----------------
- name: "AI-COMPOSE | Copy custom-image build contexts"
  ansible.builtin.copy:
    src: "images/{{ item }}/"
    dest: "{{ ai_compose_dir }}/build/{{ item }}/"
    owner: root
    group: "{{ ia_it_group | default('sudo') }}"
    mode: "0640"
    directory_mode: "0750"
  loop: "{{ ai_compose_build_by_role[ai_node_role] | default([]) }}"
  loop_control:
    label: "{{ item }}"
  when: ai_compose_build_images | default(true) | bool

- name: "AI-COMPOSE | Check which custom images already exist"
  ansible.builtin.command: "docker image inspect {{ ai_compose_images[item].tag }}"
  register: _img_check
  changed_when: false
  failed_when: false
  loop: "{{ ai_compose_build_by_role[ai_node_role] | default([]) }}"
  loop_control:
    label: "{{ ai_compose_images[item].tag }}"
  when: ai_compose_build_images | default(true) | bool

- name: "AI-COMPOSE | Build custom images (missing, or force)"
  # oikb's Dockerfile git-clones from github.com at build time -> needs internet.
  ansible.builtin.command:
    cmd: >-
      docker build -t {{ ai_compose_images[item.0].tag }}
      -f {{ ai_compose_dir }}/build/{{ item.0 }}/{{ ai_compose_images[item.0].dockerfile }}
      {{ ai_compose_dir }}/build/{{ item.0 }}
  register: _img_build
  changed_when: true
  loop: "{{ (ai_compose_build_by_role[ai_node_role] | default([])) | zip(_img_check.results | default([])) | list }}"
  loop_control:
    label: "{{ ai_compose_images[item.0].tag }}"
  when:
    - ai_compose_build_images | default(true) | bool
    - (ai_compose_build_force | default(false) | bool) or ((item.1.rc | default(1)) != 0)

- name: "AI-COMPOSE | Lock down the secrets dir (holds the auto-generated DB password)"
  # The pgvector password is auto-generated + persisted here on first render of
  # .env; 0700 root keeps it root-only regardless of the lookup's file perms.
  ansible.builtin.file:
    path: "{{ ai_pgvector_password_file | dirname }}"
    state: directory
    owner: root
    group: root
    mode: "0700"
  when: ai_node_role == 'system1'

- name: "AI-COMPOSE | Render the root-only .env (secrets/site values)"
  # Node-aware (env.j2): System 1 gets the DB/WebUI secrets + SYSTEM2_ADDR;
  # System 2 gets oikb's cross-node URL + data-source secrets. Rendering evaluates
  # the System-1 password lookups (generate + persist on first run, stable after).
  ansible.builtin.template:
    src: env.j2
    dest: "{{ ai_compose_dir }}/.env"
    owner: root
    group: root
    mode: "0600"
  no_log: true

- name: "AI-COMPOSE | Render the oikb config skeleton (System 2; not overwritten on re-run)"
  # oikb (System 2) bind-mounts ./.oikb.yaml, so the file must exist before `up`
  # (else Docker creates a directory there). force:false keeps your edits.
  ansible.builtin.template:
    src: oikb.yaml.j2
    dest: "{{ ai_compose_dir }}/.oikb.yaml"
    owner: root
    group: "{{ ia_it_group | default('sudo') }}"
    mode: "0640"
    force: false
  when: ai_node_role == 'system2'

- name: "AI-COMPOSE | Create the external named volumes (empty; populate the model separately)"
  ansible.builtin.command: "docker volume create {{ item }}"
  register: _vol
  changed_when: "'already exists' not in (_vol.stderr | default(''))"
  failed_when:
    - _vol.rc != 0
    - "'already exists' not in (_vol.stderr | default(''))"
  loop: "{{ ai_compose_volumes[ai_node_role] | default([]) }}"
  loop_control:
    label: "{{ item }}"

- name: "AI-COMPOSE | Fetch models into their volumes (opt-in; needs internet + disk)"
  # Downloads each repo into its volume via the vLLM image's `hf` CLI.
  # Idempotent: skips a volume that already holds a config.json. no_log because
  # the HF token (if any) is on the command line. The fips_off mount is required
  # -- on a FIPS host this image's OpenSSL can't do TLS without it (see below).
  ansible.builtin.command:
    cmd: >-
      docker run --rm
      {{ ('-e HF_TOKEN=' ~ ai_hf_token) if (ai_hf_token | default('') | length > 0) else '' }}
      -v {{ item.volume }}:/model
      -v {{ ai_compose_dir }}/fips_off:/proc/sys/crypto/fips_enabled:ro
      --entrypoint sh
      {{ ai_vllm_image }}
      -c "test -f /model/config.json && echo SKIP ||
          (hf download {{ item.repo }} --local-dir /model && echo FETCHED)"
  register: _fetch
  changed_when: "'FETCHED' in (_fetch.stdout | default(''))"
  no_log: true
  loop: "{{ ai_models[ai_node_role] | default([]) }}"
  loop_control:
    label: "{{ item.repo }} -> {{ item.volume }}"
  when: ai_model_fetch | default(false) | bool

- name: "AI-COMPOSE | Fetch the tiktoken/harmony encodings into the `encodings` volume"
  # gpt-oss's harmony tokenizer reads these from the `encodings` volume; without
  # them vLLM loads the model fine but crashes building the tokenizer ("invalid
  # tiktoken vocab file: No such file or directory"). Idempotent (skips files
  # already present). The fips_off mount is REQUIRED: on the FIPS host this
  # image's OpenSSL fails to init TLS (ssl.SSLError [CRYPTO]) without it.
  ansible.builtin.command:
    cmd: >-
      docker run --rm
      -v encodings:/etc/encodings
      -v {{ ai_compose_dir }}/fips_off:/proc/sys/crypto/fips_enabled:ro
      --entrypoint python3
      {{ ai_vllm_image }}
      -c "import urllib.request, os;
          base='{{ ai_encodings_base_url }}';
          todo=[f for f in {{ ai_encodings_files }} if not os.path.exists('/etc/encodings/'+f)];
          [urllib.request.urlretrieve(base+'/'+f, '/etc/encodings/'+f) for f in todo];
          print('FETCHED' if todo else 'SKIP')"
  register: _enc_fetch
  changed_when: "'FETCHED' in (_enc_fetch.stdout | default(''))"
  when:
    - ai_model_fetch | default(false) | bool
    - "'encodings' in (ai_compose_volumes[ai_node_role] | default([]))"

- name: "AI-COMPOSE | Deploy the stack (opt-in; needs the model staged + internet for pull)"
  when: ai_compose_deploy | default(false) | bool
  block:
    - name: "AI-COMPOSE | docker compose pull (ignore local-only custom images)"
      # oikb/hfcli/repomix aren't on a registry (built on the box), so their pull
      # would fail -- ignore that; `up` uses the locally-built tags.
      ansible.builtin.command:
        cmd: docker compose pull --ignore-pull-failures
        chdir: "{{ ai_compose_dir }}"
      changed_when: true

    - name: "AI-COMPOSE | docker compose up -d (reconcile: --remove-orphans)"
      # --remove-orphans drops containers no longer in this node's compose file
      # (e.g. a service that was re-homed to the other node), so re-running the
      # tool CONVERGES the running stack to the compose file. Note: it does NOT
      # remove old named volumes or images (those hold data / are pruned manually).
      ansible.builtin.command:
        cmd: docker compose up -d --remove-orphans
        chdir: "{{ ai_compose_dir }}"
      register: _compose_up
      changed_when: "'Started' in (_compose_up.stderr | default('')) or 'Created' in (_compose_up.stderr | default('')) or 'Removing' in (_compose_up.stderr | default(''))"

- name: "AI-COMPOSE | Where the stack lives"
  ansible.builtin.debug:
    msg: >-
      {{ ai_node_role }} compose placed at {{ ai_compose_dir }}/docker-compose.yaml.
      {{ 'Deployed (docker compose up -d).' if (ai_compose_deploy | default(false) | bool)
         else ('Not deployed. Populate the model into the `vllm` volume, then `cd '
               ~ ai_compose_dir ~ ' && docker compose up -d` (or set ai_compose_deploy=true).')
         if ai_node_role == 'system1'
         else ('Not deployed. `cd ' ~ ai_compose_dir ~ ' && docker compose up -d`.') }}
