---
# =============================================================================
# usg_remediate -- close the REASONABLE residual DISA-STIG findings that `usg fix`
# leaves open, on BOTH profiles, running AFTER usg_harden AND the firewall roles.
#
# WHY this role exists: `usg fix` is stamped run-once, and the `usg audit` inside
# usg_harden is a snapshot taken MID-BUILD (before the firewall roles bring ufw
# up), so a handful of findings show open in that report. Everything here is
# idempotent and re-applied every ansible-pull (config-drift correction). Nothing
# here can lock out password login.
#
# Deliberately left as POA&M (NOT auto-fixed -- each needs a secret, infra, or a
# kernel swap): FIPS mode (usg_enable_fips), UEFI/GRUB boot-loader password (needs
# a hashed secret), audit-log offload (needs a remote collector). The SSSD/CAC
# rules are de-selected in the tailoring instead (see usg_disable_smartcard_rules).
# =============================================================================

# ---------------------------------------------------------------------------
# 1) SMART CARD / pam_pkcs11 cleanup
# Fixes "ERROR:pam_pkcs11.c:365: no suitable token available / Error 2308: No
# smart card found" on boxes hardened BEFORE the smartcard tailoring opt-out
# existed (smartcard_pam_enabled had already wired pam_pkcs11.so into the stack,
# and `usg fix` is stamped run-once so it won't undo it). We simply COMMENT OUT
# the pam_pkcs11 auth line -- this removes an auth *requirement*, never touches
# pam_unix, so password login cannot be lost.
# ---------------------------------------------------------------------------
- name: "REMED | Smart card / pam_pkcs11 cleanup"
  when: usg_cleanup_pam_pkcs11 | default(true) | bool
  block:
    - name: "REMED | Find pam.d files that still reference pam_pkcs11"
      ansible.builtin.find:
        paths: /etc/pam.d
        patterns: "*"
        contains: 'pam_pkcs11\.so'
        file_type: file
      register: _pkcs11_pam

    - name: "REMED | Comment out active pam_pkcs11 lines (keeps pam_unix intact)"
      ansible.builtin.replace:
        path: "{{ item.path }}"
        # Match an uncommented auth line whose MODULE is pam_pkcs11.so; prefix '#'.
        # The [^#]* (not .*) before the module ensures we never match a line where
        # pam_pkcs11.so only appears in an inline comment after a DIFFERENT module
        # (e.g. `auth required pam_unix.so # pam_pkcs11.so`) -- commenting that out
        # would drop pam_unix and could lock the box out.
        regexp: '(?m)^(?!\s*#)(\s*auth\s+[^#]*\bpam_pkcs11\.so.*)$'
        replace: '#\1  # disabled by usg_remediate (password-login only)'
      loop: "{{ _pkcs11_pam.files | default([]) }}"
      loop_control:
        label: "{{ item.path }}"

    # Rare on this fleet (SSG edits common-auth directly rather than shipping a
    # pam-auth-update profile), but if one exists, `pam-auth-update` could re-add
    # the module on a future package trigger. Surface it so the operator can
    # `pam-auth-update` it off; we don't auto-edit pam-configs (regeneration risk).
    - name: "REMED | Detect a pam-auth-update pkcs11 profile (advisory)"
      ansible.builtin.find:
        paths: /usr/share/pam-configs
        patterns: "*"
        contains: 'pam_pkcs11\.so'
        file_type: file
      register: _pkcs11_profile

    - name: "REMED | Warn if a pkcs11 pam-config profile is present"
      ansible.builtin.debug:
        msg: >-
          A pam-auth-update profile referencing pam_pkcs11 exists
          ({{ _pkcs11_profile.files | map(attribute='path') | list | join(', ') }}).
          The active auth line was commented out, but run
          `sudo pam-auth-update` and untick PKCS#11 so it isn't re-added on a
          package update.
      when: (_pkcs11_profile.files | default([]) | length) > 0

# ---------------------------------------------------------------------------
# 1b) DCSA LOGIN BANNER for console + SSH
# USG/STIG writes the DoD Standard Mandatory Notice to /etc/issue.net (and points
# sshd at it), so SSH/console logins show the DoD banner, not our DCSA one. We
# want the SAME DCSA banner everywhere (GUI already uses dcsa_gui_banner). Write
# the DCSA text to /etc/issue.net (SSH) + /etc/issue (console) and pin sshd at it
# with a high-priority drop-in (00- sorts first, so it wins over USG's include).
# This is the same documented banner-text deviation as the GUI banner.
# ---------------------------------------------------------------------------
- name: "REMED | DCSA login banner (console + SSH)"
  when:
    - usg_ssh_banner_dcsa | default(true) | bool
    - (dcsa_gui_banner | default('') | length) > 0
  block:
    - name: "REMED | Write the DCSA banner to /etc/issue.net (SSH) + /etc/issue (console)"
      ansible.builtin.template:
        src: issue.net.j2
        dest: "{{ item }}"
        owner: root
        group: root
        mode: "0644"
      loop:
        - /etc/issue.net
        - /etc/issue

    - name: "REMED | Pin sshd at the DCSA banner (00- drop-in wins over USG)"
      ansible.builtin.copy:
        dest: /etc/ssh/sshd_config.d/00-dcsa-banner.conf
        content: "Banner /etc/issue.net\n"
        owner: root
        group: root
        mode: "0644"
      notify: Restart ssh

# ---------------------------------------------------------------------------
# 2) /var/log FILE PERMS + /var/log/audit DIR MODE
# file_permissions_var_log_stig (UBTU-24-700010) + directory_permissions_var_log_audit
# ---------------------------------------------------------------------------
- name: "REMED | /var/log permission fixes"
  when: usg_fix_log_permissions | default(true) | bool
  block:
    - name: "REMED | Find over-permissive files under /var/log (UBTU-24-700010)"
      # Mirrors the DISA remediation: any file with setuid/setgid/exec or
      # group/other-write/other-read+sticky, excluding the wtmp/btmp/lastlog files.
      ansible.builtin.command:
        cmd: >-
          find -P /var/log/ -perm /u+xs,g+xws,o+xwrt
          ! -name "[bw]tmp" ! -name "[bw]tmp.*" ! -name "[bw]tmp-*"
          ! -name "lastlog" ! -name "lastlog.*"
          -type f -regextype posix-extended -regex ".*"
      register: _var_log_bad
      changed_when: false
      failed_when: false
      check_mode: false

    - name: "REMED | Tighten perms on those files (u-xs,g-xws,o-xwrt)"
      ansible.builtin.file:
        path: "{{ item }}"
        mode: "u-xs,g-xws,o-xwrt"
        state: file
      loop: "{{ _var_log_bad.stdout_lines | default([]) }}"
      loop_control:
        label: "{{ item }}"

    - name: "REMED | Stat /var/log/audit"
      ansible.builtin.stat:
        path: /var/log/audit
      register: _audit_dir

    - name: "REMED | /var/log/audit must be mode 0750 or less permissive"
      ansible.builtin.file:
        path: /var/log/audit
        state: directory
        mode: "0750"
      when:
        - _audit_dir.stat.exists | default(false)
        - _audit_dir.stat.isdir | default(false)

# ---------------------------------------------------------------------------
# 3) CHRONY -- remote time source, configured DIRECTLY IN /etc/chrony/chrony.conf.
# The SSG OVAL reads chrony.conf (and its confdir includes) but NOT sourcedir/
# *.sources, so the directives must live in chrony.conf to satisfy:
#   chronyd_specify_remote_server  -> a `server` line
#   chronyd_server_directive       -> `server` (not `pool`)
#   chronyd_or_ntpd_set_maxpoll    -> `maxpoll <N>` on each server line
#   chronyd_sync_clock             -> a `makestep` line
# ---------------------------------------------------------------------------
- name: "REMED | Chrony remote time source (STIG server directive)"
  when: (usg_chrony_servers | default([]) | length) > 0
  block:
    - name: "REMED | Is chrony configured on this box?"
      ansible.builtin.stat:
        path: /etc/chrony/chrony.conf
      register: _chrony_conf

    - name: "REMED | Configure chrony directives in chrony.conf"
      when: _chrony_conf.stat.exists | default(false)
      block:
        - name: "REMED | Comment out `pool` directives (STIG wants server-only)"
          ansible.builtin.replace:
            path: /etc/chrony/chrony.conf
            regexp: '(?m)^(?!\s*#)(\s*)(pool\s+.*)$'
            replace: '\1# \2  # disabled by usg_remediate (STIG: server directive)'
          notify: Restart chrony

        - name: "REMED | Write the STIG time servers into chrony.conf (server + iburst + maxpoll)"
          ansible.builtin.blockinfile:
            path: /etc/chrony/chrony.conf
            marker: "# {mark} ANSIBLE MANAGED -- usg_remediate DISA-STIG time source"
            block: |
              {% for s in usg_chrony_servers %}
              server {{ s }} iburst maxpoll {{ usg_chrony_maxpoll | default(16) }}
              {% endfor %}
          notify: Restart chrony

        - name: "REMED | Ensure a makestep directive is present (chronyd_sync_clock)"
          ansible.builtin.lineinfile:
            path: /etc/chrony/chrony.conf
            regexp: '^\s*#?\s*makestep\b.*$'
            line: "{{ usg_chrony_makestep }}"
            state: present
          when: (usg_chrony_makestep | default('') | length) > 0
          notify: Restart chrony

        - name: "REMED | Remove the stale sources.d drop-in from the old approach"
          ansible.builtin.file:
            path: /etc/chrony/sources.d/stig.sources
            state: absent
          notify: Restart chrony

# ---------------------------------------------------------------------------
# 4) UFW ACTIVE (check_ufw_active) -- belt-and-suspenders. The firewall roles
# already enable ufw before this role; re-assert so an audit-only build (USG
# skipped) is never left with an inactive firewall.
# ---------------------------------------------------------------------------
- name: "REMED | Ensure ufw is active"
  community.general.ufw:
    state: enabled

# ---------------------------------------------------------------------------
# 5) RE-AUDIT -- regenerate the USG report so it reflects the fully-built,
# remediated box rather than the mid-build snapshot. Pro-attached boxes only.
# (_usg_active / _usg_target are facts set by usg_harden earlier in this play.)
# ---------------------------------------------------------------------------
- name: "REMED | Regenerate the USG compliance report (post-build)"
  when:
    - usg_remediate_reaudit | default(true) | bool
    - _usg_active | default(false) | bool
  block:
    - name: "REMED | Re-run `usg audit {{ usg_profile }}` after remediation"
      ansible.builtin.command: "usg audit {{ _usg_target | default(usg_profile) }}"
      register: _reaudit
      changed_when: false
      failed_when: false

    - name: "REMED | Collect refreshed audit artifacts from /var/lib/usg"
      ansible.builtin.find:
        paths: /var/lib/usg
        patterns: ["*.html", "*.xml"]
        file_type: file
      register: _reaudit_art

    - name: "REMED | Ensure the report dir exists"
      ansible.builtin.file:
        path: "{{ usg_report_dir }}"
        state: directory
        owner: "{{ usg_report_dir_owner | default('root') }}"
        group: "{{ usg_report_dir_group | default('root') }}"
        mode: "{{ usg_report_dir_mode | default('0750') }}"

    - name: "REMED | Copy refreshed reports into {{ usg_report_dir }}"
      ansible.builtin.copy:
        src: "{{ item.path }}"
        dest: "{{ usg_report_dir }}/"
        remote_src: true
        owner: "{{ usg_report_dir_owner | default('root') }}"
        group: "{{ usg_report_file_group | default('root') }}"
        mode: "{{ usg_report_file_mode | default('0640') }}"
      loop: "{{ _reaudit_art.files | default([]) }}"
      loop_control:
        label: "{{ item.path | basename }}"
