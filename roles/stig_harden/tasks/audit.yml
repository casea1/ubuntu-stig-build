---
# =============================================================================
# audit.yml  --  Linux Audit (auditd) hardening for the Ubuntu 24.04 Desktop STIG
# =============================================================================
# WHY this file exists:
#   The ansible-lockdown/UBUNTU24-STIG role is run with disruption_high=false
#   and cat3=false, so it SKIPS the bulk of the auditd remediation (rule files,
#   data-retention actions, dispatcher plugins). The SSG / ComplianceAsCode
#   oscap profile (xccdf_org.ssgproject.content_profile_stig) still checks for
#   all of it, so every one of those audit rules FAILS the scan. This file
#   closes that gap.
#
# HOW SSG checks audit (so we satisfy the *oscap* check, not just "set it"):
#   - Syscall/watch rules: SSG's OVAL checks the *merged* rule set that
#     `augenrules` produces from /etc/audit/rules.d/*.rules. We drop ONE
#     authoritative file (99-stig.rules) and reload with `augenrules --load`
#     (a handler) -- restarting auditd.service via systemd is unreliable on
#     Ubuntu (the unit is RefuseManualStop=yes), so we never `systemctl restart
#     auditd`. We DO enable+start the service so logging is actually running.
#   - Each syscall rule MUST appear for BOTH 64-bit (-F arch=b64) and 32-bit
#     (-F arch=b32) ABIs, and user-attributable rules MUST carry
#     `-F auid>=1000 -F auid!=unset` (SSG accepts the literal `unset`; it is the
#     modern alias for the old 4294967295 / -1 sentinel for "no loginuid set").
#   - auditd.conf data-retention: SSG checks the literal key=value in
#     /etc/audit/auditd.conf (space_left_action, admin_space_left_action,
#     action_mail_acct, space_left). We set those with lineinfile (drop-ins are
#     NOT honoured for auditd.conf -- it is a single flat file).
#   - rules.d perms: SSG requires /etc/audit/rules.d/*.rules to be 0640 or
#     stricter (no group-write, no world access).
#
# IDEMPOTENCY: apt is declarative; the rules file is a managed template-copy
# (changes only when content changes); auditd.conf edits use anchored regexps;
# the reload only fires on a real change (notify -> handler).
#
# REVIEW NOTE (regex): the lineinfile regexps below are deliberately written
# WITHOUT an inline `(?i)` flag. Ansible compiles `regexp:` with Python's `re`
# module, and on Ubuntu 24.04 (Python 3.12) an inline group flag that is NOT at
# position 0 of the pattern -- e.g. `^(?i)...` -- raises a FATAL
# `re.error: global flags not at the start of the expression`, which aborts the
# whole role. auditd.conf keys and plugin keys are canonically lowercase, so
# case-insensitivity buys us nothing; we just anchor on the literal lowercase
# key. (Confirmed by compiling the patterns on Python 3.11+.)
# =============================================================================

# ---------------------------------------------------------------------------
# 1. PACKAGES
# ---------------------------------------------------------------------------
# auditd          : the audit daemon + auditctl/augenrules userspace.
# audispd-plugins : the audit-event dispatcher plugins (au-remote, syslog,
#                   af_unix...). SSG rule "Ensure the default plugins for the
#                   audit dispatcher are Installed" checks specifically that
#                   this package is present.
- name: AUDIT | Install auditd and the audit dispatcher plugins
  ansible.builtin.apt:
    name:
      - auditd
      - audispd-plugins
    state: present
    update_cache: true
    cache_valid_time: 3600

# ---------------------------------------------------------------------------
# 2. DATA RETENTION / DISK-FULL BEHAVIOUR  (/etc/audit/auditd.conf)
# ---------------------------------------------------------------------------
# SSG checks these literal keys. We choose WORKSTATION-SAFE actions on purpose:
# this is a single-user GNOME desktop, so we must NOT `halt` the box the moment
# the audit partition fills -- that would be a self-inflicted DoS on a user's
# machine. STIG permits any documented notifying action; we email on the soft
# threshold and drop to recoverable single-user only on the *admin* (hard)
# threshold, which is the SSG/STIG canonical value (NOT the deprecated halt).
#   space_left_action       = {{ stig_audit_space_left_action }}   (soft warn)
#   admin_space_left_action = {{ stig_audit_admin_space_left_action }} (hard)
#   action_mail_acct        = {{ stig_audit_mail_acct }}
#   space_left              = {{ stig_audit_space_left_mb }} (MB; SSG wants a
#                             positive value, the soft trip point)
#
# Each key gets its OWN anchored regexp ending in `\s*=`, so `space_left` cannot
# accidentally match the `space_left_action` line (the `=` anchor forces an
# exact key match). Idempotent: re-runs rewrite the one matching line in place;
# if a key is missing, insertafter:EOF appends it once.
- name: AUDIT | Enforce auditd.conf data-retention / low-disk actions
  ansible.builtin.lineinfile:
    path: /etc/audit/auditd.conf
    regexp: '^\s*{{ item.key }}\s*='
    line: "{{ item.key }} = {{ item.value }}"
    insertafter: EOF
    state: present
    create: false
    owner: root
    group: root
    mode: "0640"
  loop:
    - { key: "space_left_action", value: "{{ stig_audit_space_left_action }}" }
    - { key: "admin_space_left_action", value: "{{ stig_audit_admin_space_left_action }}" }
    - { key: "action_mail_acct", value: "{{ stig_audit_mail_acct }}" }
    - { key: "space_left", value: "{{ stig_audit_space_left_mb }}" }
  loop_control:
    label: "{{ item.key }}"
  notify: reload audit rules

# ---------------------------------------------------------------------------
# 3. AUDIT DISPATCHER PLUGINS  (/etc/audit/plugins.d/)
# ---------------------------------------------------------------------------
# Remote-logging and external-media offload BOTH require infrastructure that
# does not exist at image-build time (a remote audisp server / removable media
# target). We VAR-GATE them: if stig_audit_remote_server is set we configure
# au-remote; otherwise we leave the plugin disabled and POA&M the two
# "offload audit logs" rules. Misconfiguring au-remote (pointing it at nothing)
# can make auditd block/queue, so "off by default" is the safe choice.
- name: AUDIT | Configure remote audit-log offload (au-remote) -- only if a server is defined
  when: stig_audit_remote_server | length > 0
  block:
    - name: AUDIT | Point au-remote at the central audit server
      ansible.builtin.lineinfile:
        path: /etc/audit/audisp-remote.conf
        regexp: '^\s*remote_server\s*='
        line: "remote_server = {{ stig_audit_remote_server }}"
        owner: root
        group: root
        mode: "0640"
      notify: reload audit rules

    - name: AUDIT | Activate the au-remote dispatcher plugin
      ansible.builtin.lineinfile:
        path: /etc/audit/plugins.d/au-remote.conf
        regexp: '^\s*active\s*='
        line: "active = yes"
        owner: root
        group: root
        mode: "0640"
      notify: reload audit rules

# ---------------------------------------------------------------------------
# 4. THE STIG SYSCALL / WATCH RULES  (/etc/audit/rules.d/99-stig.rules)
# ---------------------------------------------------------------------------
# One authoritative drop-in. `augenrules --load` merges all *.rules in order;
# the leading "99-" keeps ours last so it isn't clobbered. Mode 0640 satisfies
# "Verify Permissions on /etc/audit/rules.d/*.rules". Every user-attributable
# syscall rule carries both ABIs (b64 + b32) and `-F auid>=1000 -F auid!=unset`
# exactly as the SSG OVAL expects.
- name: AUDIT | Deploy the comprehensive STIG audit rules
  ansible.builtin.copy:
    dest: /etc/audit/rules.d/99-stig.rules
    owner: root
    group: root
    mode: "0640"
    content: |
      ## Managed by Ansible (stig_harden role, audit.yml). DO NOT EDIT BY HAND.
      ## Loaded via `augenrules --load`. SSG profile: stig (ubuntu2404).

      ## --- DAC permission modifications (key: perm_mod) --------------------
      ## chmod/chown/xattr family. SSG groups these under perm_mod.
      -a always,exit -F arch=b64 -S chmod,fchmod,fchmodat -F auid>=1000 -F auid!=unset -F key=perm_mod
      -a always,exit -F arch=b32 -S chmod,fchmod,fchmodat -F auid>=1000 -F auid!=unset -F key=perm_mod
      -a always,exit -F arch=b64 -S chown,fchown,fchownat,lchown -F auid>=1000 -F auid!=unset -F key=perm_mod
      -a always,exit -F arch=b32 -S chown,fchown,fchownat,lchown -F auid>=1000 -F auid!=unset -F key=perm_mod
      -a always,exit -F arch=b64 -S setxattr,fsetxattr,lsetxattr,removexattr,fremovexattr,lremovexattr -F auid>=1000 -F auid!=unset -F key=perm_mod
      -a always,exit -F arch=b32 -S setxattr,fsetxattr,lsetxattr,removexattr,fremovexattr,lremovexattr -F auid>=1000 -F auid!=unset -F key=perm_mod

      ## --- File deletion / rename by users (key: delete) -------------------
      -a always,exit -F arch=b64 -S rename,renameat,rmdir,unlink,unlinkat -F auid>=1000 -F auid!=unset -F key=delete
      -a always,exit -F arch=b32 -S rename,renameat,rmdir,unlink,unlinkat -F auid>=1000 -F auid!=unset -F key=delete

      ## --- Unsuccessful file access (key: access) -------------------------
      ## EACCES (permission denied) and EPERM (operation not permitted), per ABI.
      -a always,exit -F arch=b64 -S creat,open,openat,open_by_handle_at,truncate,ftruncate -F exit=-EACCES -F auid>=1000 -F auid!=unset -F key=access
      -a always,exit -F arch=b64 -S creat,open,openat,open_by_handle_at,truncate,ftruncate -F exit=-EPERM -F auid>=1000 -F auid!=unset -F key=access
      -a always,exit -F arch=b32 -S creat,open,openat,open_by_handle_at,truncate,ftruncate -F exit=-EACCES -F auid>=1000 -F auid!=unset -F key=access
      -a always,exit -F arch=b32 -S creat,open,openat,open_by_handle_at,truncate,ftruncate -F exit=-EPERM -F auid>=1000 -F auid!=unset -F key=access

      ## --- Kernel module load/unload (key: modules) -----------------------
      ## Module ops are root-only; SSG checks these WITHOUT the auid filter.
      -a always,exit -F arch=b64 -S init_module,finit_module,delete_module -F key=modules
      -a always,exit -F arch=b32 -S init_module,finit_module,delete_module -F key=modules

      ## --- Privileged commands (key: privileged) --------------------------
      ## Explicit fdisk/su/unix_update (called out by the STIG) plus the
      ## standard SUID/SGID privileged set. Each: -F path=<exe> -F perm=x
      ## -F auid>=1000 -F auid!=unset. Watch the SSG audit_rules_privileged_*
      ## rules -- paths are distro-specific; these match Ubuntu 24.04 layout.
      -a always,exit -F path=/usr/sbin/fdisk -F perm=x -F auid>=1000 -F auid!=unset -F key=privileged
      -a always,exit -F path=/usr/bin/su -F perm=x -F auid>=1000 -F auid!=unset -F key=privileged
      -a always,exit -F path=/usr/sbin/unix_update -F perm=x -F auid>=1000 -F auid!=unset -F key=privileged
      -a always,exit -F path=/usr/bin/sudo -F perm=x -F auid>=1000 -F auid!=unset -F key=privileged
      -a always,exit -F path=/usr/sbin/usermod -F perm=x -F auid>=1000 -F auid!=unset -F key=privileged
      -a always,exit -F path=/usr/bin/chage -F perm=x -F auid>=1000 -F auid!=unset -F key=privileged
      -a always,exit -F path=/usr/bin/chsh -F perm=x -F auid>=1000 -F auid!=unset -F key=privileged
      -a always,exit -F path=/usr/bin/chfn -F perm=x -F auid>=1000 -F auid!=unset -F key=privileged
      -a always,exit -F path=/usr/bin/gpasswd -F perm=x -F auid>=1000 -F auid!=unset -F key=privileged
      -a always,exit -F path=/usr/bin/newgrp -F perm=x -F auid>=1000 -F auid!=unset -F key=privileged
      -a always,exit -F path=/usr/bin/passwd -F perm=x -F auid>=1000 -F auid!=unset -F key=privileged
      -a always,exit -F path=/usr/bin/mount -F perm=x -F auid>=1000 -F auid!=unset -F key=privileged
      -a always,exit -F path=/usr/bin/umount -F perm=x -F auid>=1000 -F auid!=unset -F key=privileged
      -a always,exit -F path=/usr/bin/crontab -F perm=x -F auid>=1000 -F auid!=unset -F key=privileged
      -a always,exit -F path=/usr/lib/openssh/ssh-keysign -F perm=x -F auid>=1000 -F auid!=unset -F key=privileged
      -a always,exit -F path=/usr/bin/pkexec -F perm=x -F auid>=1000 -F auid!=unset -F key=privileged
      -a always,exit -F path=/usr/lib/dbus-1.0/dbus-daemon-launch-helper -F perm=x -F auid>=1000 -F auid!=unset -F key=privileged
      -a always,exit -F path=/usr/bin/wall -F perm=x -F auid>=1000 -F auid!=unset -F key=privileged
      -a always,exit -F path=/usr/bin/chcon -F perm=x -F auid>=1000 -F auid!=unset -F key=privileged
      -a always,exit -F path=/usr/sbin/apparmor_parser -F perm=x -F auid>=1000 -F auid!=unset -F key=privileged

      ## --- Directory / file watches ---------------------------------------
      ## sudoers drop-ins: changes to delegated privilege (key: actions; SSG
      ## also accepts the identity key, but actions matches the STIG title).
      -w /etc/sudoers.d/ -p wa -k actions
      ## systemd journal: detect tampering/rotation of the audit-relevant logs.
      -w /var/log/journal -k systemd_journal
      ## user crontabs: scheduled-task creation/modification.
      -w /var/spool/cron -p wa -k cron
  notify: reload audit rules

# ---------------------------------------------------------------------------
# 5. SERVICE STATE
# ---------------------------------------------------------------------------
# Enable + start auditd so logging is live and survives reboot. We use
# state: started (NOT restarted) on purpose -- Ubuntu's auditd unit sets
# RefuseManualStop=yes, so a restart is unreliable. New rules are applied by
# the `augenrules --load` handler instead, without bouncing the daemon.
- name: AUDIT | Ensure auditd is enabled and running
  ansible.builtin.systemd:
    name: auditd
    enabled: true
    state: started
