---
# Installed automatically by ansible-pull if you add --purge / a galaxy step,
# or manually with:  ansible-galaxy install -r requirements.yml
#
# We pin to a git ref rather than floating on devel so your image builds are
# reproducible. Update the version deliberately, re-test, then re-pin.

roles:
  - name: UBUNTU24-STIG
    src: https://github.com/ansible-lockdown/UBUNTU24-STIG.git
    scm: git
    version: 1.3.0         # pinned 2026-06-02 (latest tagged release; re-test before bumping)

# The stig_harden gap-remediation task files use modules from community.general
# (pamd, pam_limits, ufw, ini_file). It is bundled with the full `ansible`
# package but NOT with `ansible-core` alone, so pin it for reproducible builds.
# Install both roles AND collections with:  ansible-galaxy install -r requirements.yml
collections:
  - name: community.general
    version: ">=8.0.0"     # floor; pin an exact version for a frozen gold image
  - name: ansible.posix    # local_accounts uses ansible.posix.acl for shared-folder ACLs
    version: ">=1.5.0"     # also bundled with the full `ansible` package
