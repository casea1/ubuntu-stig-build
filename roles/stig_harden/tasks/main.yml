---
# Imports the ansible-lockdown/UBUNTU24-STIG remediation role.
# Install it first (build-time, online):
#   sudo ansible-galaxy install -r requirements.yml
#
# The role is SERVER-oriented; the vars below (set in group_vars/all.yml) tell
# it a GUI is present and which categories to apply. CAT III is off by default.

- name: Apply DISA Ubuntu 24.04 STIG (CAT I/II via Ansible Lockdown)
  ansible.builtin.include_role:
    name: UBUNTU24-STIG
    apply:
      tags: always
  # The role reads its toggles — ubtu24stig_cat1/2/3, ubtu24stig_gui,
  # ubtu24stig_disruption_high — directly from group_vars/all.yml (global
  # scope). Do NOT re-pass them here: a line like
  #   ubtu24stig_cat1: "{{ ubtu24stig_cat1 }}"
  # is self-referential and triggers "recursive loop detected in template
  # string". Verified on 1.3.0: cat toggles default true (group_vars sets cat3
  # false) and ubtu24stig_gui auto-detects GNOME, forced true to keep GDM.

# ---------------------------------------------------------------------------
# DESKTOP-SPECIFIC FIXUPS
# The Server STIG has no notion of GDM. These cover the graphical-login
# controls (banner, idle lock) that the server role may not set for GNOME.
# ---------------------------------------------------------------------------

- name: Set the GDM login-screen DCSA banner (Ubuntu's greeter.dconf-defaults)
  # The role's UBTU-24-200650 banner-text control is disabled (buggy join).
  # Ubuntu's GDM reads the banner from /etc/gdm3/greeter.dconf-defaults, which
  # gdm's generate-config bakes into the gdm dconf db at startup. Set both the
  # enable flag and the full DCSA banner text here. The string value MUST be wrapped in
  # GVariant single quotes ('...') or generate-config rejects the keyfile.
  community.general.ini_file:
    path: /etc/gdm3/greeter.dconf-defaults
    section: org/gnome/login-screen
    option: "{{ item.option }}"
    value: "{{ item.value }}"
    mode: 'go-wx'
  loop:
    - { option: banner-message-enable, value: "true" }
    - { option: banner-message-text, value: "'{{ dcsa_gui_banner }}'" }

# ---------------------------------------------------------------------------
# SSG / ComplianceAsCode GAP REMEDIATION  (tasks/*.yml, included below)
# ---------------------------------------------------------------------------
# The box is hardened by the ansible-lockdown role ABOVE, but the compliance
# scan (scap_scan role) grades it with the SSG/ComplianceAsCode "stig" profile
# for ubuntu2404 -- a DIFFERENT project whose rules don't map 1:1 to the
# lockdown role. Combined with ubtu24stig_disruption_high:false (which SKIPS the
# lockdown role's most breaking controls) and cat3:false, that leaves a large
# set of SSG rules failing (auditd rules, PAM faillock, GNOME dconf locks, sshd,
# chrony/ufw/AIDE, file perms, GRUB password, ...).
#
# Each file below is an idempotent, desktop-safe, SSG-rule-targeted set of tasks
# that closes those gaps. They run AFTER the lockdown role (so they win on any
# overlap) and AFTER all package installs. Tunables live in group_vars/all.yml;
# per-file rationale + POA&M notes are in each file's header and in OPERATIONS.md.
#
# gnome.yml SUPERSEDES the old inline 00-screensaver / 00-stig-desktop-lock block
# that used to live here -- it sets the same keys (including the UBTU-24-200043
# picture-uri and UBTU-24-300025 media-keys-logout work-arounds) with the
# SSG-correct GVariant spellings, LOCKS all of them, and removes the old
# keyfiles. Do not re-add the inline block.
- name: Apply SSG/ComplianceAsCode STIG gap remediation (desktop-safe, idempotent)
  ansible.builtin.include_tasks: "{{ gap_file }}"
  loop:
    - audit.yml        # auditd rules + retention + dispatcher plugins
    - pam.yml          # faillock lockout, faildelay, hashing rounds, no-empty-pw
    - sessions.yml     # concurrent-login cap + interactive session timeout
    - gnome.yml        # GNOME dconf locks (screensaver/automount/ctrl-alt-del) + GDM banner
    - ssh.yml          # sshd X11Forwarding/PubkeyAuth + SSH login banner
    - services.yml     # chrony (NTP), ufw firewall, AIDE, rsyslog monitoring
    - filesystem.yml   # lib/var-log/journal perms, dmesg_restrict, RTC=UTC
    - grub.yml         # GRUB2 bootloader password (BIOS+UEFI; self-guarded)
  loop_control:
    # Use gap_file, NOT the default 'item': the included files run their own
    # `loop:` tasks (also using 'item'), and a shared 'item' triggers Ansible's
    # "loop variable 'item' is already in use" warning.
    loop_var: gap_file
