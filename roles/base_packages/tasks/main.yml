---
# Baseline package install. Runs BEFORE hardening so that umask/mount
# restrictions don't interfere with package and pip operations.
#
# The concrete package set depends on the deployment profile (see local.yml):
#   development -> development.yml  (the full engineering-workstation app set:
#                  clamav, wireshark, putty, editor, VS Code, PowerShell,
#                  provisioning services)
#   ai          -> ai.yml           (a lean headless baseline; the AI stack and
#                  USG pull in almost everything else they need themselves)

- name: Update apt cache
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600

- name: "Full system package upgrade (opt-in; base_packages_full_upgrade)"
  # OFF by default. A full-upgrade can pull a newer kernel or library that
  # conflicts with the pinned NVIDIA driver / FIPS kernel and makes the image
  # non-reproducible, so patching is a deliberate choice. Flip
  # base_packages_full_upgrade: true (per box or fleet-wide) to patch the base
  # OS during the build. Runs BEFORE hardening + the AI/GPU installs, so those
  # land on an already-current base. NOTE (ai profile): this can bump the kernel
  # -- the box reboots for FIPS anyway on the first run; after any kernel change
  # re-check `nvidia-smi` and `/proc/sys/crypto/fips_enabled`. Ongoing security
  # patches otherwise come via Ubuntu Pro (ESM + canonical-livepatch).
  ansible.builtin.apt:
    upgrade: full
    update_cache: true
  when: base_packages_full_upgrade | default(false) | bool

- name: "Install common packages (both profiles)"
  # cifs-utils (mount SMB/CIFS shares) + net-tools (ifconfig/route/netstat).
  # Wanted on every box regardless of profile; edit base_common_packages in
  # group_vars to change the set.
  ansible.builtin.apt:
    name: "{{ base_common_packages | default([]) }}"
    state: present
  when: (base_common_packages | default([])) | length > 0

- name: Install the DEVELOPMENT engineering-workstation package set
  ansible.builtin.import_tasks: development.yml
  when: is_development | default(true) | bool

- name: Install the AI-server baseline package set
  ansible.builtin.import_tasks: ai.yml
  when: is_ai | default(false) | bool
