---
# =============================================================================
# ai_stack -- HOST PREP ONLY for the ai profile.
#
# The AI containers (vLLM / Open WebUI / pgvector / Docling) are deployed from
# YOUR OWN prebuilt images + compose files. Ansible does NOT render a compose
# file, pull images, generate secrets, or start containers -- it only prepares
# and (via usg_harden) hardens the HOST so your stack can run on it:
#   - Docker engine (docker-ce >= docker_ce_min_version) + the compose v2 plugin
#   - the NVIDIA driver + container toolkit (when gpu_enabled) so GPU containers work
# The inbound firewall openings your containers need are applied AFTER USG by the
# ai_firewall role (post-hardening) -- see roles/ai_firewall.
#
# Runs BEFORE usg_harden (needs internet for the Docker/NVIDIA apt repos).
# =============================================================================

- name: "AI host | Install Docker engine (docker-ce + compose v2 plugin)"
  ansible.builtin.import_tasks: docker.yml

- name: "AI host | Install the NVIDIA GPU stack (driver + container toolkit)"
  # include_tasks (dynamic): gpu.yml ends with `meta: flush_handlers`, which
  # ignores a task-level when on a static import -- a dynamic include gates the
  # whole file (meta included) behind this condition.
  ansible.builtin.include_tasks: gpu.yml
  when: gpu_enabled | default(true) | bool

- name: "AI host | Deploy Portainer (container-management web UI)"
  # Management plane only -- NOT your AI workload stack. Needs Docker up (above)
  # and internet (image pull). Its port is opened by ai_firewall after USG.
  ansible.builtin.import_tasks: portainer.yml
  when: portainer_enabled | default(false) | bool

- name: "AI host | Reboot reminder (NVIDIA driver just installed)"
  ansible.builtin.debug:
    msg: >-
      An NVIDIA driver was installed. REBOOT this box before the GPU is usable;
      your GPU containers will come up once the driver module loads after reboot.
  when: ai_stack_reboot_required | bool
