---
# =============================================================================
# docker_hardening -- CIS-Docker-Benchmark-aligned daemon hardening (ai profile).
# USG hardens the OS but does NOT touch the Docker daemon/containers, and there
# is no DISA STIG for docker-ce, so this closes the container-runtime gap.
#
# The settings are MERGED into /etc/docker/daemon.json so the NVIDIA runtime that
# ai_stack registers (via `nvidia-ctk runtime configure`) is preserved. Idempotent;
# restarts docker ONLY when the config actually changes (handler). Gated is_ai +
# docker_hardening_enabled in local.yml.
#
# Key settings (docker_hardening_daemon_opts, group_vars):
#   no-new-privileges: true   -> no container can gain privileges via setuid (CIS 5.25, daemon-wide)
#   live-restore: true        -> containers keep running across a daemon restart (CIS 2.14)
#   userland-proxy: false     -> use the kernel hairpin NAT, smaller attack surface (CIS 2.15)
#   log-opts (size/rotate)    -> bound container log growth
# =============================================================================

- name: "DOCKER-HARDEN | Read the existing daemon.json (keeps the NVIDIA runtime)"
  ansible.builtin.slurp:
    src: /etc/docker/daemon.json
  register: _dh_raw
  failed_when: false

- name: "DOCKER-HARDEN | Merge the hardening options into daemon.json"
  ansible.builtin.copy:
    content: >-
      {{ ((_dh_raw.content | b64decode | from_json) if (_dh_raw.content is defined and (_dh_raw.content | length) > 0) else {})
         | combine(docker_hardening_daemon_opts) | to_nice_json }}
    dest: /etc/docker/daemon.json
    owner: root
    group: root
    mode: "0644"
  notify: restart docker

- name: "DOCKER-HARDEN | Result"
  ansible.builtin.debug:
    msg: >-
      Docker daemon hardened (merged CIS options into /etc/docker/daemon.json).
      Verify: docker info | grep -iE 'live restore|userland' ; and daemon.json keeps the nvidia runtime.
