# =============================================================================
# System 1 (dev-ai1) -- UI / TEXT-GENERATION node
#   vLLM gpt-oss-120B (+ switchable Granite-4.1-30B) + Open WebUI + Redis + pgvector
# Managed by ansible (ai_compose role); placed in {{ ai_compose_dir }}.
#
# Open WebUI health-gates on pgvector + redis (single compose project). It reaches
# System 2 (embeddings :8002, vision :8003, Docling :5001, LGTM :4317) by the
# address in SYSTEM2_ADDR -- monitoring, oikb, and the hfcli/repomix utilities all
# live on System 2 (see system2-compose.yaml).
#
# Secrets/site values come from the sibling root-only `.env` (rendered from
# site.yml, no_log) -- this file holds NO secrets, so it's safe in the repo.
#   Run:   cd /opt/it/docker && docker compose up -d
#   Switch chat model:  ./switch-model.sh gpt-oss | granite
# =============================================================================
name: ai-system1

networks:
  oi:
    driver: bridge

volumes:
  vllm: { external: true }            # gpt-oss-120B weights (populate BEFORE up)
  granite32b: { external: true }      # Granite-4.1-30B weights (the switchable 2nd model)
  encodings: { external: true }       # tiktoken/harmony encodings
  pgvector-data: { external: true }
  open-webui: { external: true }
  redis-data: { external: true }

services:
  # ---- Chat models: gpt-oss-120B (default) and Granite-4.1-30B, ONE AT A TIME ----
  # 2x 48GB (RTX 6000 Ada) can't hold both, so they're alternates: gpt-oss auto-
  # starts; Granite is under the `granite` profile. Both share the network alias
  # `chat-llm`, so Open WebUI (-> http://chat-llm:8000/v1) always reaches whichever
  # is running and the model just changes in its dropdown. Switch with:
  #   /opt/it/docker/switch-model.sh gpt-oss | granite
  vllm:
    image: vllm/vllm-openai:v0.22.1-cu129-ubuntu2404
    container_name: vllm-server
    ipc: host
    ports:
      - "8000:8000"
    volumes:
      - vllm:/gpt120b
      - encodings:/etc/encodings
      # HOST runs FIPS (kernel fips_enabled=1), but this image has no FIPS OpenSSL
      # provider -> its DRBG can't init and the container crash-loops. vLLM isn't
      # FIPS-validated anyway, so mask the flag to 0 for THIS container only (host
      # stays FIPS). See docs/operate.md "FIPS + inference containers". POA&M.
      - ./fips_off:/proc/sys/crypto/fips_enabled:ro
    environment:
      TIKTOKEN_ENCODINGS_BASE: "/etc/encodings"
      TIKTOKEN_RS_CACHE_DIR: "/etc/encodings"
    command:
      - --model=/gpt120b
      - --served-model-name=gpt-oss-120b
      - --gpu-memory-utilization=0.90
      - --tensor-parallel-size=2
      - --max-model-len=32768
      - --port=8000
      - --enable-auto-tool-choice
      - --tool-call-parser=openai
    networks:
      oi:
        aliases: [chat-llm]
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - { driver: nvidia, count: all, capabilities: [gpu] }

  # Alternate chat model -- NOT started by default (`granite` profile). The switch
  # script stops gpt-oss before starting this so only one holds VRAM.
  vllm-granite:
    image: vllm/vllm-openai:v0.22.1-cu129-ubuntu2404
    container_name: vllm-granite
    profiles: ["granite"]
    ipc: host
    ports:
      - "8001:8000"                     # host debug port (Open WebUI uses the alias)
    volumes:
      - granite32b:/granite30b
      - ./fips_off:/proc/sys/crypto/fips_enabled:ro
    command:
      - --model=/granite30b
      - --served-model-name=granite-4.1-30b
      - --gpu-memory-utilization=0.90
      - --tensor-parallel-size=2
      - --max-model-len=32768
      - --port=8000
      - --enable-auto-tool-choice
      - --tool-call-parser=hermes       # Granite 4 tool-call format
    networks:
      oi:
        aliases: [chat-llm]
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - { driver: nvidia, count: all, capabilities: [gpu] }

  pgvector:
    image: pgvector/pgvector:pg16-trixie
    container_name: pgvector
    environment:
      POSTGRES_DB: "openwebui"
      POSTGRES_USER: "postgres"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:?set in .env}"
    volumes:
      - pgvector-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d openwebui"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks: [oi]
    restart: unless-stopped

  redis:
    image: redis:7.2.14-bookworm
    container_name: redis
    entrypoint: ["redis-server"]
    command: "--save 30 1 --appendonly yes --maxclients 10000 --timeout 1800 --maxmemory-policy noeviction"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    cap_drop: [ALL]
    cap_add: [SETGID, SETUID, DAC_OVERRIDE]
    logging:
      driver: "json-file"
      options:
        max-size: "1m"
        max-file: "1"
    networks: [oi]
    restart: unless-stopped

  open-webui:
    image: ghcr.io/open-webui/open-webui:v0.10.2
    container_name: open-webui
    depends_on:
      pgvector: { condition: service_healthy }
      redis: { condition: service_healthy }
    # Resolve System 2 by its canonical name inside the container without host DNS:
    # when SYSTEM2_ADDR is an IP, .env sets SYSTEM2_HOSTS_ENTRY=dev-ai2:<ip>; if it's
    # already a name, this is a harmless localhost:127.0.0.1 no-op. (URLs below use
    # ${SYSTEM2_ADDR} directly, so an IP address works with or without this line.)
    extra_hosts:
      - "${SYSTEM2_HOSTS_ENTRY:-localhost:127.0.0.1}"
    volumes:
      - open-webui:/app/backend/data
    environment:
      DATABASE_URL: "postgresql://postgres:${POSTGRES_PASSWORD:?set in .env}@pgvector:5432/openwebui"
      AIOHTTP_CLIENT_TIMEOUT: "6000"
      VECTOR_DB: "pgvector"
      VECTOR_DB_URL: "postgresql://postgres:${POSTGRES_PASSWORD:?set in .env}@pgvector:5432/openwebui"
      ENV: "dev"
      # ---- Chat models: local vLLM via the `chat-llm` alias (gpt-oss/Granite,
      # switchable) + Granite VISION on System 2. Switching the local model needs
      # no UI change. SYSTEM2_ADDR comes from .env (System 2's hostname/IP). ----
      OPENAI_API_BASE_URLS: "http://chat-llm:8000/v1;http://${SYSTEM2_ADDR:?set in .env}:8003/v1"
      OPENAI_API_KEYS: "sk-noauth;sk-noauth"
      # ---- RAG embeddings: Granite embedding vLLM on System 2 ----
      RAG_EMBEDDING_ENGINE: "openai"
      RAG_EMBEDDING_MODEL: "granite-embedding-small-english-r2"
      RAG_OPENAI_API_BASE_URL: "http://${SYSTEM2_ADDR:?set in .env}:8002/v1"
      RAG_OPENAI_API_KEY: "sk-noauth"
      # ---- Document extraction: Docling on System 2 (switch to Tika by setting
      # CONTENT_EXTRACTION_ENGINE=tika + TIKA_SERVER_URL=http://${SYSTEM2_ADDR}:9998) ----
      CONTENT_EXTRACTION_ENGINE: "docling"
      DOCLING_SERVER_URL: "http://${SYSTEM2_ADDR:?set in .env}:5001"
      # ---- Observability: OTel -> LGTM/Grafana on System 2 ----
      ENABLE_OTEL: "true"
      ENABLE_OTEL_TRACES: "true"
      ENABLE_OTEL_METRICS: "true"
      ENABLE_OTEL_LOGS: "true"
      OTEL_SERVICE_NAME: "open-webui"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://${SYSTEM2_ADDR:?set in .env}:4317"
      OTEL_EXPORTER_OTLP_INSECURE: "true"
      OTEL_METRICS_EXPORTER_ENDPOINT: "http://${SYSTEM2_ADDR:?set in .env}:4317"
      OTEL_METRICS_EXPORTER_OTLP_INSECURE: "true"
      OTEL_LOGS_EXPORTER_OTLP: "http://${SYSTEM2_ADDR:?set in .env}:4317"
      OTEL_LOGS_EXPORTER_OTLP_INSECURE: "true"
      OTEL_METRICS_EXPORT_INTERVAL_MILLIS: "10000"
      DATABASE_POOL_SIZE: "15"
      DATABASE_POOL_MAX_OVERFLOW: "20"
      DATABASE_ENABLE_SESSION_SHARING: "true"
      DATABASE_POOL_TIMEOUT: "60"
      WEBUI_SECRET_KEY: "${WEBUI_SECRET_KEY:?set in .env}"
      REDIS_URL: "redis://redis:6379/0"
      ENABLE_WEBSOCKET_SUPPORT: "true"
      WEBSOCKET_MANAGER: "redis"
      WEBSOCKET_REDIS_URL: "redis://redis:6379/1"
      UVICORN_WORKERS: "9"
      CORS_ALLOW_ORIGIN: "${OI_ORIGIN:-*}"
      REDIS_SOCKET_KEEPALIVE: "true"
      # User-activity audit trail (AU controls). METADATA = who / endpoint / when
      # / result, NO prompt/response content -> the log stays unclassified. Raise
      # to REQUEST / REQUEST_RESPONSE in site.yml to capture prompt/response text
      # (then the log holds data-at-level and must be protected like the DB).
      # Writes to /app/backend/data/audit.log -> persisted in the open-webui volume.
      AUDIT_LOG_LEVEL: "${AUDIT_LOG_LEVEL:-METADATA}"
    ports:
      - "3000:8080"
    networks: [oi]
    restart: unless-stopped
# (Monitoring/LGTM, oikb, and the hfcli/repomix utilities live on System 2.)
