---
# Imports the ansible-lockdown/UBUNTU24-STIG remediation role.
# Install it first (build-time, online):
#   sudo ansible-galaxy install -r requirements.yml
#
# The role is SERVER-oriented; the vars below (set in group_vars/all.yml) tell
# it a GUI is present and which categories to apply. CAT III is off by default.

- name: Apply DISA Ubuntu 24.04 STIG (CAT I/II via Ansible Lockdown)
  ansible.builtin.include_role:
    name: UBUNTU24-STIG
    apply:
      tags: always
  # The role reads its toggles — ubtu24stig_cat1/2/3, ubtu24stig_gui,
  # ubtu24stig_disruption_high — directly from group_vars/all.yml (global
  # scope). Do NOT re-pass them here: a line like
  #   ubtu24stig_cat1: "{{ ubtu24stig_cat1 }}"
  # is self-referential and triggers "recursive loop detected in template
  # string". Verified on 1.3.0: cat toggles default true (group_vars sets cat3
  # false) and ubtu24stig_gui auto-detects GNOME, forced true to keep GDM.

# ---------------------------------------------------------------------------
# DESKTOP-SPECIFIC FIXUPS
# The Server STIG has no notion of GDM. These cover the graphical-login
# controls (banner, idle lock) that the server role may not set for GNOME.
# ---------------------------------------------------------------------------

- name: Ensure dconf GDM banner directory exists
  ansible.builtin.file:
    path: /etc/dconf/db/gdm.d
    state: directory
    mode: "0755"

- name: Set DoD login banner for GDM (graphical login)
  ansible.builtin.copy:
    dest: /etc/dconf/db/gdm.d/01-banner-message
    mode: "0644"
    content: |
      [org/gnome/login-screen]
      banner-message-enable=true
      banner-message-text='{{ dod_gui_banner }}'
  notify: dconf update

- name: Enforce screen lock on idle (GNOME) for STIG idle-timeout control
  ansible.builtin.copy:
    dest: /etc/dconf/db/local.d/00-screensaver
    mode: "0644"
    content: |
      [org/gnome/desktop/session]
      idle-delay=uint32 900
      [org/gnome/desktop/screensaver]
      lock-enabled=true
      lock-delay=uint32 0
      picture-uri=''
      [org/gnome/settings-daemon/plugins/media-keys]
      logout=['']
  notify: dconf update

# These two keys are normally set by role controls UBTU-24-200043 (picture-uri)
# and UBTU-24-300025 (media-keys logout), but those have a trailing-'=' typo in
# the option name that corrupts dconf. We disable them (group_vars) and set +
# lock the correct values here instead.
- name: Ensure the dconf locks directory exists
  ansible.builtin.file:
    path: /etc/dconf/db/local.d/locks
    state: directory
    mode: "0755"

- name: Lock the desktop dconf keys we set in place of the buggy role controls
  ansible.builtin.copy:
    dest: /etc/dconf/db/local.d/locks/00-stig-desktop-lock
    mode: "0644"
    content: |
      /org/gnome/desktop/screensaver/picture-uri
      /org/gnome/settings-daemon/plugins/media-keys/logout
  notify: dconf update
