---
# =============================================================================
# Central configuration for the Ubuntu 24.04 Desktop STIG build.
# Edit this file to control what gets installed and how aggressively the box
# is hardened. Everything else reads from here.
# =============================================================================

# ---- Users who need to run packet captures (Wireshark) ---------------------
# STIG restricts raw packet capture to authorized users. These users get added
# to the 'wireshark' group instead of running dumpcap as root.
wireshark_users:
  - austin_case_adm        # real local admin account on the imaged box

# ---- Editor of choice ------------------------------------------------------
# vscode pulls from Microsoft's apt repo (needs internet at build time).
# Set to "vim" or "neovim" if you want to stay fully in-distro.
editor_choice: vscode        # options: vscode | vim | neovim

# ---- ClamAV ----------------------------------------------------------------
clamav_run_daemon: true       # enable clamav-daemon (on-access/scheduled scans)
clamav_freshclam_enabled: true
# How often freshclam checks for definition updates per day (cron/systemd).
clamav_freshclam_checks_per_day: 12

# =============================================================================
# STIG HARDENING TOGGLES (passed through to ansible-lockdown/UBUNTU24-STIG)
# =============================================================================
# CAT I = high severity, CAT II = medium, CAT III = low.
# Default: apply CAT I + II, leave CAT III off until you've validated it
# doesn't break your desktop workflow. Flip cat3 on once you're confident.
ubtu24stig_cat1: true
ubtu24stig_cat2: true
ubtu24stig_cat3: false

# The Lockdown role assumes SERVER. We're on GNOME Desktop, so tell it a GUI
# is present and DON'T let it disable/remove the graphical target or GDM.
ubtu24stig_gui: true

# ---- GDM login banner: work around an upstream role bug ---------------------
# Role control UBTU-24-200650 sets banner-message-text via
#   "{{ ubtu24stig_logon_banner | join('\n') }}"
# but ubtu24stig_logon_banner is a STRING, so join() iterates its characters and
# writes the banner one-char-per-line into /etc/gdm3/greeter.dconf-defaults,
# corrupting it -> GDM's generate-config fails -> gdm.service won't start (the
# box looks like it hangs at the boot splash). Verified on role 1.3.0.
# Fix: disable that control and set the banner ourselves (stig_harden role,
# /etc/dconf/db/gdm.d/01-banner-message) using the full standard DoD text below.
ubtu24stig_200650: false
dod_gui_banner: "You are accessing a U.S. Government (USG) Information System (IS) that is provided for USG-authorized use only. By using this IS (which includes any device attached to this IS), you consent to the following conditions: -The USG routinely intercepts and monitors communications on this IS for purposes including, but not limited to, penetration testing, COMSEC monitoring, network operations and defense, personnel misconduct (PM), law enforcement (LE), and counterintelligence (CI) investigations. -At any time, the USG may inspect and seize data stored on this IS. -Communications using, or data stored on, this IS are not private, are subject to routine monitoring, interception, and search, and may be disclosed or used for any USG-authorized purpose. -This IS includes security measures (e.g., authentication and access controls) to protect USG interests--not for your personal benefit or privacy. -Notwithstanding the above, using this IS does not constitute consent to PM, LE or CI investigative searching or monitoring of the content of privileged communications, or work product, related to personal representation or services by attorneys, psychotherapists, or clergy, and their assistants. Such communications and work product are private and confidential. See User Agreement for details."

# ---- More upstream GNOME dconf bugs (malformed option names) ----------------
# UBTU-24-200043 writes `option: picture-uri=` and UBTU-24-300025 writes
# `option: logout=` (trailing '=' typos in community.general.ini_file), producing
# invalid dconf keyfiles that break `dconf update`. Disable both; we set the
# correct values (picture-uri='' and media-keys logout=['']) and lock them in
# the stig_harden role's /etc/dconf/db/local.d/00-screensaver keyfile.
ubtu24stig_200043: false
ubtu24stig_300025: false

# ---- Controls we deliberately skip on Desktop ------------------------------
# These are the usual server-vs-desktop collisions. Each one you skip MUST be
# documented as an exception/POA&M for your auditor. Tags map to STIG IDs;
# adjust to match the role's tag names for the release you pin.
stig_skip_tags:
  - DISA-STIG-UBTU-24-???      # placeholder: remove GUI / multi-user.target default
  # Add specific control tags here as you triage the first scan's findings.

# ---- Safety valve ----------------------------------------------------------
# Verified against role 1.3.0: there is NO `ubtu24stig_fullauto` var and the
# role has no interactive pause. The real control is disruption_high — when
# false, the role SKIPS its most breaking controls (gates 8 task files). Keep
# it false until a clean validated pass, then flip true to apply the
# high-impact controls too. (The VM snapshot is the real rollback safety net.)
ubtu24stig_disruption_high: false

# =============================================================================
# SCAP SCAN
# =============================================================================
# Where to drop the compliance report. Collect this BEFORE air-gapping.
scap_report_dir: /var/log/stig-scan
# Profile id inside the SSG datastream. Verified present in the pinned SSG
# release below (products/ubuntu2404 ships stig.profile).
scap_profile: xccdf_org.ssgproject.content_profile_stig

# ---- SSG content source -----------------------------------------------------
# The distro package (ssg-debderived) ships datastreams only through Ubuntu
# 22.04, so the scan fetches the Ubuntu 24.04 datastream from an official SCAP
# Security Guide release instead. Pinned for reproducible images — bump
# deliberately and re-test (note the GitHub tag is v-prefixed: v{{ ssg_content_version }}).
scap_content_dir: /usr/share/xml/scap/ssg/content
ssg_content_version: "0.1.81"
ssg_release_base: "https://github.com/ComplianceAsCode/content/releases/download"

# =============================================================================
# DEVELOPER TOOLING (dev_tools role; full package/extension lists live in
# roles/dev_tools/defaults/main.yml)
# =============================================================================
dev_tools_user: austin_case_adm        # owns VS Code extensions + docker group
eng_venv_path: /opt/eng-venv           # shared Python environment ("eng" command)
dotnet_sdk_package: dotnet-sdk-8.0      # .NET SDK from the Ubuntu archive (LTS)

# PowerShell LTS — installed in base_packages as a pinned .deb (PowerStrux backend).
powershell_version: "7.4.16"

# =============================================================================
# CLASSIFICATION BANNER (persistent top + bottom on-screen bars)
# =============================================================================
# NOT a STIG requirement -- this is a classified-system / accreditation control.
# To CHANGE THE LEVEL: edit classification_banner_level below, push, and re-run
# the build (it's idempotent). Valid levels are the section names in
# roles/classification_banner/files/classification-banner.conf:
#   UNCLASSIFIED | CUI | FOUO | CONFIDENTIAL | SECRET | "TOP SECRET" | SCI
classification_banner_enabled: true
classification_banner_level: "UNCLASSIFIED"
# A docked top/bottom banner needs an Xorg login session -- Wayland (Ubuntu's
# default) ignores the X11 dock/strut hints, so the bars won't pin. true => the
# build forces GDM to Xorg. Set false only if you switch to a Wayland-native
# (GNOME Shell extension) approach.
classification_banner_force_xorg: true
