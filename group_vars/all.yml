---
# =============================================================================
# Central configuration for the Ubuntu 24.04 STIG build.
# Edit this file to control what gets installed and how aggressively the box
# is hardened. Everything else reads from here.
# =============================================================================

# ---- Deployment profile ----------------------------------------------------
# Selects WHICH build this box gets. The pipeline (local.yml) runs a different
# role set per profile:
#   development -> an engineering workstation: base apps, dev_tools, a GNOME
#                  desktop + xrdp (so users RDP in for a GUI, even on a headless
#                  server base), classification banner, hardening via Canonical's
#                  USG (`usg fix disa_stig`) + GUI/GNOME/USB desktop fixups
#                  (desktop_hardening role), and a wallpaper. Needs an Ubuntu Pro
#                  token, same as ai.
#   ai          -> a headless Ubuntu Pro AI server: a lean baseline, the
#                  selectable AI tool stack (ai_stack role -> Docker Compose:
#                  vLLM / Open WebUI / pgvector / Docling), and hardening via
#                  Canonical's Ubuntu Security Guide (USG -> `usg fix disa_stig`).
#
# Default is 'development'. Override per-machine at deploy WITHOUT editing this
# file:
#   ansible-pull ... -e deployment_profile=ai
# (bootstrap.sh accepts PROFILE=ai and passes this for you.)
# Back-compat: the first release used 'desktop'/'server'; those are still
# accepted as aliases for 'development'/'ai'.
deployment_profile: development    # options: development | ai  (aliases: desktop, server)

# ---- Root disk auto-expand (disk_expand role, runs first) ------------------
# Ubuntu autoinstall often creates a small root LV (e.g. 100G) on a large disk,
# leaving most of the volume group unallocated -- which fills fast once the AI
# model volumes land under /var/lib/docker. This grows the root LV + filesystem
# to use all free VG space, ONLINE (no reboot). Grow-only + idempotent; a no-op
# on non-LVM boxes or a fully-allocated VG. Set false if you deliberately keep
# separate partitions for /var, /home, ... The VG/LV names are Ubuntu's
# autoinstall defaults; override per box in site.yml if yours differ.
disk_autoexpand: true
disk_root_vg: ubuntu-vg
disk_root_lv: ubuntu-lv

# ---- Users who need to run packet captures (Wireshark) ---------------------
# STIG restricts raw packet capture to authorized users. These users get added
# to the 'wireshark' group instead of running dumpcap as root.
wireshark_users:
  - austin_case_adm        # real local admin account on the imaged box

# ---- Editor of choice ------------------------------------------------------
# vscode pulls from Microsoft's apt repo (needs internet at build time).
# Set to "vim" or "neovim" if you want to stay fully in-distro.
editor_choice: vscode        # options: vscode | vim | neovim

# ---- Base OS patching ------------------------------------------------------
# The build always refreshes the apt cache and installs the packages it needs,
# but does NOT upgrade the whole OS by default (an unattended full-upgrade can
# pull a kernel/library that conflicts with the pinned NVIDIA driver / FIPS
# kernel and hurts reproducibility). Set true to run `apt full-upgrade` early in
# the build (before hardening + GPU installs) so the box is patched on a current
# base. On the ai profile a kernel bump means re-checking nvidia-smi + FIPS after
# the reboot. Ongoing security patches otherwise come via Ubuntu Pro (ESM +
# livepatch). Override per box in site.yml.
base_packages_full_upgrade: false

# ---- ClamAV ----------------------------------------------------------------
clamav_run_daemon: true       # enable clamav-daemon (on-access/scheduled scans)
clamav_freshclam_enabled: true
# How often freshclam checks for definition updates per day (cron/systemd).
clamav_freshclam_checks_per_day: 12

# =============================================================================
# STIG HARDENING TOGGLES (LEGACY -- ansible-lockdown/UBUNTU24-STIG)
# =============================================================================
# NOTE: as of the USG switch, BOTH profiles harden with Canonical's USG, not the
# ansible-lockdown role -- so the ubtu24stig_* toggles and GNOME-bug workarounds
# in THIS section are no longer consumed. They're kept for reference / rollback
# (re-add the UBUNTU24-STIG role to requirements.yml and the import to
# desktop_hardening if you ever revert). USG settings live in the USG HARDENING
# section near the bottom of this file; the GNOME dconf tunables further down
# (gnome_idle_delay_seconds, etc.) ARE still used by desktop_hardening/gnome.yml.
#
# CAT I = high severity, CAT II = medium, CAT III = low.
# Default: apply CAT I + II, leave CAT III off until you've validated it
# doesn't break your desktop workflow. Flip cat3 on once you're confident.
ubtu24stig_cat1: true
ubtu24stig_cat2: true
ubtu24stig_cat3: false

# The Lockdown role assumes SERVER. We're on GNOME Desktop, so tell it a GUI
# is present and DON'T let it disable/remove the graphical target or GDM.
ubtu24stig_gui: true

# ---- GDM login banner: work around an upstream role bug ---------------------
# Role control UBTU-24-200650 sets banner-message-text via
#   "{{ ubtu24stig_logon_banner | join('\n') }}"
# but ubtu24stig_logon_banner is a STRING, so join() iterates its characters and
# writes the banner one-char-per-line into /etc/gdm3/greeter.dconf-defaults,
# corrupting it -> GDM's generate-config fails -> gdm.service won't start (the
# box looks like it hangs at the boot splash). Verified on role 1.3.0.
# Fix: disable that control and set the banner ourselves (stig_harden role,
# /etc/dconf/db/gdm.d/01-banner-message) using the full DCSA Authorized Warning
# Banner text below.
ubtu24stig_200650: false
# Single-quoted YAML + literal `\n` on purpose: the value is written verbatim
# into the GVariant string ('...') in greeter.dconf-defaults, where GDM unescapes
# `\n` into real line breaks. Single-quoted YAML keeps the backslashes literal --
# a double-quoted scalar would turn `\n` into real newlines and corrupt the
# (single physical line) keyfile. Keep the text apostrophe-free so the GVariant
# '...' stays valid.
dcsa_gui_banner: 'Defense Counterintelligence and Security Agency (DCSA) Authorized Warning Banner\n\nYou are accessing a U.S. Government (USG) Information System (IS). Use of this USG IS constitutes:\n- Consent for authorized monitoring at all times.\n-- To ensure proper functioning of equipment and systems including security systems and devices.\n-- To prevent, detect, and deter violations of statutes and security regulations and other unauthorized use of the system.\nThis system and related equipment are intended for the communication, transmission, processing, and storage of official USG or other authorized information only. Communications using, or data stored on this system are:\n- Not private\n-- Subject to routine monitoring, interception, and search.\n-- May be disclosed or used for any authorized purpose.\nIf monitoring of this USG IS reveals possible evidence of violation of criminal statutes or security regulations (or other unauthorized usage), this evidence and any other related information, including user identification, may be provided to law enforcement officials or may result in appropriate administrative or disciplinary action.'

# ---- More upstream GNOME dconf bugs (malformed option names) ----------------
# UBTU-24-200043 writes `option: picture-uri=` and UBTU-24-300025 writes
# `option: logout=` (trailing '=' typos in community.general.ini_file), producing
# invalid dconf keyfiles that break `dconf update`. Disable both; we set the
# correct values (picture-uri='' and media-keys logout=['']) and lock them in
# the stig_harden role's gnome.yml (the /etc/dconf/db/local.d/00-stig-gnome
# keyfile + matching locks), which also satisfies the SSG dconf checks.
ubtu24stig_200043: false
ubtu24stig_300025: false

# ---- Controls we deliberately skip on Desktop ------------------------------
# These are the usual server-vs-desktop collisions. Each one you skip MUST be
# documented as an exception/POA&M for your auditor. Tags map to STIG IDs;
# adjust to match the role's tag names for the release you pin.
stig_skip_tags:
  - DISA-STIG-UBTU-24-???      # placeholder: remove GUI / multi-user.target default
  # Add specific control tags here as you triage the first scan's findings.

# ---- Safety valve ----------------------------------------------------------
# Verified against role 1.3.0: there is NO `ubtu24stig_fullauto` var and the
# role has no interactive pause. The real control is disruption_high — when
# false, the role SKIPS its most breaking controls (gates 8 task files). Keep
# it false until a clean validated pass, then flip true to apply the
# high-impact controls too. (The VM snapshot is the real rollback safety net.)
ubtu24stig_disruption_high: false

# =============================================================================
# SCAP SCAN
# =============================================================================
# Where to drop the compliance report. Collect this BEFORE air-gapping.
scap_report_dir: /var/log/stig-scan
# Profile id inside the SSG datastream. Verified present in the pinned SSG
# release below (products/ubuntu2404 ships stig.profile).
scap_profile: xccdf_org.ssgproject.content_profile_stig

# ---- SSG content source -----------------------------------------------------
# The distro package (ssg-debderived) ships datastreams only through Ubuntu
# 22.04, so the scan fetches the Ubuntu 24.04 datastream from an official SCAP
# Security Guide release instead. Pinned for reproducible images — bump
# deliberately and re-test (note the GitHub tag is v-prefixed: v{{ ssg_content_version }}).
scap_content_dir: /usr/share/xml/scap/ssg/content
ssg_content_version: "0.1.81"
ssg_release_base: "https://github.com/ComplianceAsCode/content/releases/download"

# =============================================================================
# DEVELOPER TOOLING (dev_tools role; full package/extension lists live in
# roles/dev_tools/defaults/main.yml)
# =============================================================================
dev_tools_user: austin_case_adm        # owns VS Code extensions + docker group
eng_venv_path: /opt/eng-venv           # shared Python environment ("eng" command)
dotnet_sdk_package: dotnet-sdk-8.0      # .NET SDK from the Ubuntu archive (LTS)

# PowerShell LTS — installed in base_packages as a pinned .deb (PowerStrux backend).
powershell_version: "7.4.16"

# ---- code-server (VS Code in the browser; development profile) --------------
# Installs code-server (dev_tools) and runs it as a per-user systemd service so
# users can reach a full VS Code from a browser (in addition to RDP). Served over
# self-signed TLS with a generated password; desktop_hardening opens the port.
dev_code_server_enabled: true
dev_code_server_version: ""           # "" = latest; pin e.g. "4.100.1" for frozen images
dev_code_server_bind_addr: "0.0.0.0"  # set 127.0.0.1 to require an SSH tunnel / RDP browser
dev_code_server_port: 8080
dev_code_server_tls: true             # self-signed HTTPS (front with a real cert for prod)

# =============================================================================
# REMOTE DESKTOP  (development profile -> remote_desktop role)
# =============================================================================
# The development profile can run on HEADLESS SERVER hardware that users RDP into.
# This role installs the GNOME desktop (so a server base gets a GUI) and xrdp (the
# RDP server), configured for the GNOME-over-Xorg path with the Ubuntu 24.04
# gotchas handled (Wayland off, ssl-cert key access, colord polkit prompt).

# Install the GNOME desktop environment. Idempotent no-op on a box that already
# has it (e.g. an Ubuntu Desktop base). ubuntu-desktop-minimal = GNOME Shell +
# GDM3 + core apps without the full application suite; use "ubuntu-desktop" for
# the complete set, or "" to skip installing GNOME (assume it's already present).
dev_install_gnome: true
dev_gnome_package: ubuntu-desktop-minimal   # or: ubuntu-desktop

# Install + configure xrdp so users can RDP into the GNOME session. xrdp logins
# go through PAM, so the STIG faillock/faildelay hardening applies to them too.
dev_rdp_enabled: true
dev_rdp_port: 3389
# TLS security layer for RDP: xrdp presents the system snakeoil cert and is added
# to the ssl-cert group so it can read the key. Set false only if a client truly
# can't negotiate TLS (then RDP falls back to negotiate/RDP security).
dev_rdp_use_tls: true
# OPTIONAL: restrict RDP logins to members of this group (enforced in PAM). Empty
# = any local account with a password may RDP (still password- + faillock-gated).
# Set e.g. "rdpusers" to gate it; the role creates the group and adds the check.
dev_rdp_allowed_group: ""

# =============================================================================
# CLASSIFICATION BANNER (persistent top + bottom on-screen bars)
# =============================================================================
# NOT a STIG requirement -- this is a classified-system / accreditation control.
# To CHANGE THE LEVEL: edit classification_banner_level below, push, and re-run
# the build (it's idempotent). Valid levels are the section names in
# roles/classification_banner/files/classification-banner.conf:
#   UNCLASSIFIED | CUI | FOUO | CONFIDENTIAL | SECRET | "TOP SECRET" | SCI
classification_banner_enabled: true
classification_banner_level: "UNCLASSIFIED"
# A docked top/bottom banner needs an Xorg login session -- Wayland (Ubuntu's
# default) ignores the X11 dock/strut hints, so the bars won't pin. true => the
# build forces GDM to Xorg. Set false only if you switch to a Wayland-native
# (GNOME Shell extension) approach.
classification_banner_force_xorg: true

# =============================================================================
# STIG GAP-REMEDIATION TUNABLES
# =============================================================================
# MOSTLY LEGACY: these fed the deleted SSG gap files (audit/pam/sessions/ssh/
# filesystem/grub) that USG now supersedes -- so the audit/pam/sessions/ssh/
# filesystem/grub tunables below are no longer consumed. STILL LIVE and used by
# desktop_hardening: the GNOME dconf tunables (gnome_idle_delay_seconds,
# gnome_lock_delay_seconds), the ufw list (stig_firewall_limit_ports), and
# usb_storage_enabled. The rest are kept for reference / rollback to lockdown.

# =============================================================================
# AUDIT (auditd) TUNABLES  -- consumed by roles/stig_harden/tasks/audit.yml
# =============================================================================
# Low-disk actions for /etc/audit/auditd.conf. WORKSTATION-SAFE defaults: warn
# (email) on the soft threshold, drop to recoverable single-user only on the
# hard/admin threshold. Do NOT use 'halt' on a desktop -- a full audit volume
# would power-cycle the user's box (and 'halt' is deprecated upstream). These
# are the SSG/STIG-canonical values (space_left_action=email,
# admin_space_left_action=single).
stig_audit_space_left_action: "email"     # soft trip: notify, keep running
stig_audit_admin_space_left_action: "single"  # hard trip: drop to single-user (recoverable; NOT halt)
stig_audit_mail_acct: "root"               # who gets the low-disk warning mail (needs a working MTA to deliver)
# Soft low-disk trip point in MB. SSG just wants a positive value; 250MB gives
# headroom to react before the admin (hard) threshold.
stig_audit_space_left_mb: 250

# Remote audit-log offload (au-remote). EMPTY = feature disabled + POA&M.
# Set to the hostname/IP of your central audisp-remote collector to enable
# /etc/audit/audisp-remote.conf + activate the au-remote plugin. Leave "" on
# standalone/air-gapped images.
stig_audit_remote_server: ""

# ---- PAM faillock / password-policy tunables (stig_harden/pam.yml) ----------
# All consumed by /etc/security/faillock.conf and the common-auth/-password edits.
# Lock the account after this many consecutive failed logons. STIG: <= 3.
pam_faillock_deny: 3
# Window (seconds) over which failed attempts are counted toward 'deny'. STIG: 900 (15 min).
pam_faillock_fail_interval: 900
# Seconds an account stays locked. STIG-preferred 0 = locked until an admin runs
# `faillock --user <name> --reset` (set a positive value, e.g. 900, for self-unlock).
pam_faillock_unlock_time: 0
# pam_faildelay delay AFTER a failed logon, in MICROSECONDS. STIG: >= 4s -> 4000000.
pam_faildelay_delay_usec: 4000000
# pam_unix password-hashing rounds (cost). SSG reference value is 5000; raise for stronger hashing.
pam_unix_rounds: 5000

# =============================================================================
# SESSION LIMITS (stig_harden role -> tasks/sessions.yml)
# =============================================================================
# Max simultaneous interactive logins per user (SSG accounts_max_concurrent_login_sessions).
# STIG default is 10. Lower it if your mission has a tighter requirement; do not
# set it so low that legitimate multi-terminal admin work breaks.
stig_max_concurrent_sessions: 10

# Idle interactive-shell timeout in SECONDS before auto-logout
# (SSG accounts_tmout). STIG default is 900 (15 minutes). The check passes for
# any value 1..900; raising it above 900 will FAIL the scan.
stig_session_timeout: 900

# ---- GNOME dconf hardening tunables (stig_harden/tasks/gnome.yml) ------------
# Screensaver idle/lock timings, written as GVariant uint32 in the keyfile.
# CRITICAL: the SSG ubuntu2404 STIG control pins inactivity_timeout_value to
# 10_minutes (=600s), and the idle-delay OVAL passes only when the value is
# >0 AND <=600. So 600 is the MAX that still passes -- 900 (15 min) FAILS the
# scan. Lower is fine; do not raise above 600.
gnome_idle_delay_seconds: 600   # org/gnome/desktop/session idle-delay (>0 and <=600 to pass SSG)
# Lock-delay is the grace window between the screensaver activating and the lock
# engaging; the STIG control sets var_screensaver_lock_delay=immediate, i.e. 0.
gnome_lock_delay_seconds: 0     # org/gnome/desktop/screensaver lock-delay (0 = lock immediately)

# ---- OpenSSH server hardening (stig_harden role, ssh.yml) -------------------
# STIG/SSG-mandated SSH directives. These are the baseline values the SSG oscap
# check expects; only change them if you have an accreditation reason to.
ssh_x11_forwarding: "no"            # SSG sshd_disable_x11_forwarding -> X11Forwarding no
ssh_pubkey_authentication: "yes"    # SSG sshd_enable_pubkey_auth -> PubkeyAuthentication yes
# Path to the plain-text login banner file sshd presents pre-auth. SSG's
# sshd_enable_warning_banner check expects exactly /etc/issue.net on Ubuntu.
ssh_banner_path: /etc/issue.net

# =============================================================================
# SERVICES CATEGORY TUNABLES (stig_harden/tasks/services.yml)
# Time sync, host firewall, AIDE, rsyslog remote-access monitoring.
# =============================================================================

# ---- Host firewall: inbound services to OPEN and RATE-LIMIT (ufw) -----------
# SSG's "ufw Must rate-limit network interfaces" check is satisfied per-opened
# service via `ufw limit`. A hardened workstation typically exposes nothing
# inbound; we open ONLY what's listed here, and we open it with `limit`
# (drops a source IP making >6 connections / 30s) rather than a plain `allow`.
# - Leave the default (ssh limited) if remote admin/build over SSH is needed.
# - To run a fully closed box (no inbound at all), set this to [] -- but then
#   the rate-limit rule has no opened port to demonstrate on; track it as POA&M
#   (see services category POA&M). Each entry: port (name or number) + proto.
# NOTE: now consumed by desktop_hardening/tasks/main.yml (the FW block), which
# `ufw limit`s each entry here and adds RDP (dev_rdp_port) when dev_rdp_enabled.
stig_firewall_limit_ports:
  - { port: ssh, proto: tcp }      # OpenSSH; rate-limited brute-force throttle

# NOTE on time sync: there are no numeric tunables here -- chrony's NTP source
# pool is set by the distro default /etc/chrony/chrony.conf (or your site's
# pool drop-in). Override pool/server lines in a separate chrony drop-in if your
# enclave uses internal time servers; this category only manages the service.

# =============================================================================
# FILESYSTEM hardening tunables (stig_harden/tasks/filesystem.yml)
# Sane STIG/SSG defaults; override here if your content release expects different
# values. All are referenced as {{ var }} in filesystem.yml.
# =============================================================================

# Restrict Access to Kernel Message Buffer (SSG sysctl_kernel_dmesg_restrict,
# STIG UBTU-24-600140). 1 = only root may read the kernel ring buffer (dmesg).
stig_kernel_dmesg_restrict: 1

# Group that must own the /var/log directory (STIG UBTU-24-700100). On Ubuntu
# this is 'syslog' (NOT root) -- the STIG check explicitly requires syslog.
stig_var_log_group: "syslog"

# /var/log directory mode. SSG/STIG caps log dirs at <= 0755 (UBTU-24-700120);
# 0750 is tighter and still passes (group-readable, no 'other' access). Octal
# string for Ansible.
stig_var_log_dir_mode: "0750"

# /var/log regular-file mode. SSG/STIG caps log files at <= 0640
# (UBTU-24-700150); 0640 = root rw, group (adm) read, no 'other'. Octal string.
stig_var_log_file_mode: "0640"

# System journal DIRECTORY mode (SSG directory_permissions_var_log_journal,
# STIG UBTU-24-700060/080 fix). 2640 = setgid (so new journal files inherit
# systemd-journal) + rwxr-----. This is the DISA fix value; do NOT use 2750
# (2750 grants group-execute and is MORE permissive than the 2640 the STIG
# checks "or less permissive" against, so it would FAIL on Ubuntu 24.04).
stig_journal_dir_mode: "2640"

# /usr/bin/journalctl mode (SSG file_permissions_journalctl, STIG
# UBTU-24-700030 fix `chmod 740`). 0740 = root rwx, group r, no other.
stig_journalctl_mode: "0740"

# =============================================================================
# GRUB2 BOOTLOADER PASSWORD (stig_harden :: grub.yml)
# STIG: "Set Boot Loader Password in grub2" (BIOS) + "Set the UEFI Boot Loader
# Password". A GRUB superuser + PBKDF2 hash so EDITING a menu entry / dropping
# to the GRUB shell requires a password. Default boot stays password-free
# (menuentries are generated with --unrestricted).
# =============================================================================

# Name of the GRUB superuser written as `set superusers="..."`. This is a
# GRUB-internal account, NOT a Linux user -- it does not need to exist in
# /etc/passwd. Keep it generic; do not reuse a human login name.
# IMPORTANT: the SSG superuser OVAL regex is ^[\s]*set[\s]+superusers=("?)[a-zA-Z_]+\1$
# which accepts ONLY letters and underscores -- NO digits, NO hyphens. If you
# change this, keep it to [a-zA-Z_]+ or the grub2_password check (criterion B)
# will silently fail.
grub_superuser: "bootadmin"

# PBKDF2-SHA512 hash of the GRUB password. CHANGEME is a deliberate sentinel:
# while it is present the entire grub.yml category SKIPS (no credential is
# written) so a build can't brick boot with a bogus hash -- the rule then shows
# as a scan finding / POA&M until you set a real value.
#
# HOW TO GENERATE (on any Ubuntu box, interactively):
#     grub-mkpasswd-pbkdf2
#   Enter the desired GRUB password twice. Copy the FULL token it prints:
#     grub.pbkdf2.sha512.10000.<salt>.<hash>
#   (copy ONLY that token, not the surrounding sentence).
#
# THEN VAULT IT (never commit the hash in plaintext):
#     ansible-vault encrypt_string 'grub.pbkdf2.sha512.10000.<salt>.<hash>' \
#       --name 'grub_password_pbkdf2'
#   Paste the resulting !vault block in place of the line below.
grub_password_pbkdf2: "grub.pbkdf2.sha512.10000.CHANGEME_RUN_grub-mkpasswd-pbkdf2_AND_VAULT_THE_HASH"

# =============================================================================
# LOCAL ACCOUNTS / ACCESS GROUPS / SHARED FOLDERS / USB POLICY (local_accounts)
# =============================================================================
# Run the local_accounts role (groups + standing accounts + shared folders + USB
# policy). true (default) => it runs on BOTH the development and ai profiles, so the
# org access groups/accounts are consistent fleet-wide. Set false to skip it on a
# given box. (On the ai profile the dta USB *mount* carve-out is inert unless
# usb-storage is also re-enabled after USG -- the groups/accounts/folders still work.)
local_accounts_enabled: true

# Access groups (lowercase Linux convention). Created before the accounts below.
#   dta    -- data-transfer agents; the only group allowed to mount USB storage
#   audit  -- auditors; owns /opt/_AuditFiles (sudo is granted per-account below)
#   sentry -- owns /home/shared
local_groups:
  - dta
  - audit
  - sentry

# Standing accounts. Each is created with a LOCKED password ('!') -- the account
# exists but cannot be logged into until an admin sets one per-machine at deploy:
#   sudo passwd <user>
# A locked password is NOT an empty password, so this satisfies the STIG
# no-empty-password control. Supplementary groups are set DECLARATIVELY (the
# listed set is authoritative; the implicit per-user primary group is added by
# useradd). "sudo" group membership grants full sudo via Ubuntu's stock
# %sudo rule. (The installer account austin_case_adm is intentionally NOT listed.)
local_users:
  - { name: overlord,         groups: [sudo] }            # break-glass super admin
  - { name: austin_case_dta,  groups: [dta] }
  - { name: adam_kabat_adm,   groups: [sudo] }
  - { name: adam_kabat_aud,   groups: [audit, sudo] }
  - { name: adam_kabat_dta,   groups: [dta] }
  - { name: pj_bates_adm,     groups: [sudo] }
  - { name: pj_bates_aud,     groups: [audit, sudo] }
  - { name: zac_mccamant_adm, groups: [sudo] }
  - { name: zac_mccamant_aud, groups: [audit, sudo] }
  - { name: zac_mccamant_dta, groups: [dta] }

# Groups EVERY standing account above ALSO joins, merged into each account's own
# `groups` list. All initial accounts get `sentry` (the shared /home/shared
# workspace) in addition to their role groups. Set to [] to disable.
local_users_common_groups:
  - sentry

# Accounts created OUTSIDE the playbook (the OS-install operator/admin account)
# that should ALSO join local_users_common_groups (e.g. sentry). These are added
# with APPEND -- their existing groups (sudo, adm, ...) are preserved -- and ONLY
# if the account already exists; the playbook never CREATES them. Add more names
# (or change the default) if your operator account differs per box.
local_operator_accounts:
  - "{{ dev_tools_user }}"

# Group-shared directories: setgid 2770 (others denied) + a POSIX default ACL so
# group members get full access to everything created inside even under the STIG
# umask 077 (which would otherwise strip group bits off new files).
local_shared_dirs:
  - { path: /opt/_AuditFiles, group: audit,  mode: "2770" }
  - { path: /home/shared,     group: sentry, mode: "2770" }

# USB storage is restricted to members of this group (udisks2 polkit + udev).
usb_access_group: dta

# Re-enable the usb-storage kernel module. The lockdown role (stig_harden)
# blacklists usb-storage per the DISA STIG "disable USB mass storage" control --
# which disables USB storage for EVERYONE and would defeat the dta carve-out
# above (no block device ever appears). This fleet needs USB for data-transfer
# agents, so stig_harden strips that blacklist AFTER the lockdown role and loads
# the module; the dta udev + polkit policy then governs who may mount. Documented
# deviation (OPERATIONS.md POA&M). Set false to keep USB mass storage fully
# disabled (the dta carve-out is then moot).
usb_storage_enabled: true

# Base-box default accounts to PURGE if present. Vagrant/Packer base images ship
# a 'vagrant' user with a known password, NOPASSWD sudo (/etc/sudoers.d/vagrant),
# and a public "insecure" SSH key -- a STIG finding the build does not create but
# should clean up. Removal is idempotent (a no-op if the account is absent).
# Do NOT list your operator account (austin_case_adm) or any local_users entry.
purge_default_accounts:
  - vagrant
  # - ubuntu     # uncomment if your base image's cloud-init 'ubuntu' user is unwanted
  # - packer

# =============================================================================
# DESKTOP BRANDING / WALLPAPER (desktop_branding role)
# =============================================================================
# The wallpaper file ships in roles/desktop_branding/files/ and is deployed here.
branding_wallpaper_dest: /usr/share/backgrounds/SHB_Background.jpg
# true => also set the SESSION LOCK SCREEN to the wallpaper. This OVERRIDES the
# STIG "Implement Blank Screensaver" control (documented deviation). Set false to
# brand only the desktop (then re-enable the blank lock screen in gnome.yml).
branding_lockscreen_wallpaper: true

# =============================================================================
# TPM2 LUKS AUTO-UNLOCK (tpm_luks_unlock role) -- OPT-IN, per physical machine
# =============================================================================
# Binds a LUKS keyslot to THIS machine's TPM2 (via clevis) so the encrypted disk
# unlocks at boot with NO passphrase. The install passphrase keyslot is KEPT as
# recovery and never removed.
#
# SECURITY (accepted deviation): TPM-only, no PIN -> a stolen powered-off disk
# auto-decrypts on this hardware. Only meaningful with **Secure Boot ON** (PCR 7);
# the role warns if it is off. The binding is sealed to this box's TPM, so this
# must run on each PHYSICAL machine (the per-machine ansible-pull does) -- it
# cannot be captured into a cloned gold image.
tpm_luks_enabled: true            # ON by default (fleet standard: TPM auto-unlock)
#
# SECRET HANDLING -- the LUKS passphrase must NOT live in this PUBLIC repo.
# Leave `luks_passphrase` EMPTY here. The role reads the passphrase OUT OF BAND
# from a root-only (0600) file on each box (`luks_passphrase_file`), which your
# PRIVATE autoinstall seed writes during install (it already knows the passphrase,
# since it sets disk encryption). It is used ONCE to authorize the TPM keyslot and
# is never needed at boot afterwards. Nothing secret is committed.
# (An inline `luks_passphrase` is still honoured for a PRIVATE/offline repo, but
#  NEVER paste a secret into a PUBLIC one -- the encrypted blob is forever in git.)
luks_passphrase: ""
# Root-only file holding the install passphrase, placed out-of-band (autoinstall
# late-commands / write_files, or dropped manually). Read once for the bind; never
# in git. See OPERATIONS.md "TPM2 LUKS auto-unlock".
luks_passphrase_file: /etc/luks/initial-passphrase
# Delete luks_passphrase_file right after a successful TPM bind so the per-box
# passphrase doesn't persist on the auto-unlocking disk. Re-drop the file only if
# you need to re-bind (e.g. after a firmware/PCR change). Set false to keep it.
luks_passphrase_purge_after_bind: true
# LUKS partition. Empty = auto-detect the single crypto_LUKS device. Set
# explicitly (e.g. /dev/nvme0n1p3) if the box has more than one LUKS volume.
luks_device: ""
# PCR 7 = Secure Boot state: stable across SIGNED kernel updates, so the unlock
# survives `apt upgrade`. Do NOT add PCRs 0/4/8/9 unless you want to re-bind on
# every kernel update.
tpm_luks_pcrs: "7"
tpm_luks_pcr_bank: "sha256"
tpm_luks_tpm2_cfg:
  pcr_bank: "{{ tpm_luks_pcr_bank }}"
  pcr_ids: "{{ tpm_luks_pcrs }}"

# #############################################################################
# #############################################################################
# ##                                                                         ##
# ##   UBUNTU PRO SERVER PROFILE  (deployment_profile: server)               ##
# ##                                                                         ##
# ##   Everything below is consumed ONLY when deployment_profile == server.  ##
# ##   On a desktop build these vars are inert. See docs/ai-server-design.md ##
# ##                                                                         ##
# #############################################################################
# #############################################################################

# =============================================================================
# AI SERVER HOST PREP  (ai profile -> ai_stack role: Docker + NVIDIA only)
# =============================================================================
# IMPORTANT: the AI tools (vLLM / Open WebUI / pgvector / Docling) are deployed
# from YOUR OWN prebuilt images + compose files. Ansible does NOT render compose,
# pull images, generate secrets, or start containers. On the ai profile it only:
#   - installs Docker (docker-ce + compose v2 plugin) and the NVIDIA GPU stack,
#   - STIG-hardens the host with USG (usg_harden), and
#   - opens the inbound ports your containers publish (ai_firewall, after USG).
# Deploy your compose stack however you like once the host is prepared.

# ---- Docker Engine (docker-ce, official Docker apt repo) -------------------
# docker-ce (NOT Ubuntu's docker.io). "" version = install the repo's latest;
# the role then ASSERTS the installed version is >= docker_ce_min_version so the
# >=29.5.2 requirement is enforced without brittle exact-version apt pinning.
docker_ce_version: ""                 # "" = latest from Docker's apt repo
docker_ce_min_version: "29.5.2"       # hard floor asserted after install (7960 baseline ships 29.6.1)

# Extra Docker CLI plugins beyond the base engine, from Docker's apt repo. The
# 7960 software baseline adds the Model Runner + Sandbox plugins. Set to [] to
# install just the base engine.
docker_extra_packages:
  - docker-model-plugin      # `docker model ...` (Docker Model Runner)
  - docker-sbx               # `docker sbx ...`   (Docker Sandboxes)

# Account added to the `docker` group so it can drive your compose without sudo.
ai_stack_user: "{{ dev_tools_user }}"

# ---- GPU (NVIDIA) ----------------------------------------------------------
# Your vLLM containers need CUDA. true => install the NVIDIA driver (optional,
# see gpu_install_driver) AND the nvidia-container-toolkit, and wire the `nvidia`
# runtime into Docker so containers can request `--gpus all`. A DRIVER install
# requires a REBOOT before the GPU is usable.
gpu_enabled: true
# Set false if drivers are managed out-of-band (cloud GPU image, MAAS, etc.):
# the toolkit + Docker runtime are still configured, but no driver is installed.
gpu_install_driver: true

# NVIDIA driver package. "" = let `ubuntu-drivers` autoselect the recommended
# driver. The dual RTX 6000 7960s + the cu129 vLLM image need a RECENT driver, so
# if autoselect is too old, PIN a branch here, e.g. "nvidia-driver-595-server-open"
# (the RTX PRO 6000 "Blackwell" cards require the -open kernel-module variant; you
# may need NVIDIA's CUDA apt repo / the graphics-drivers PPA to reach 595).
nvidia_driver_package: ""
# Reach very new driver branches (e.g. 595) that AREN'T in Ubuntu's archive by
# adding NVIDIA's CUDA apt repo before installing nvidia_driver_package. Pair this
# with nvidia_driver_package set to a CUDA-repo package name, e.g.
# "nvidia-driver-595-open" (open kernel modules, required for Blackwell). Leaves
# the ubuntu-drivers autoselect path alone when false.
nvidia_use_cuda_repo: false
nvidia_cuda_repo_distro: "ubuntu2404"        # NVIDIA CUDA repo distro slug
nvidia_cuda_keyring_version: "1.1-1"         # cuda-keyring package version
# Enforced floor on the ACTIVE driver (nvidia-smi) after install/reboot. Matches
# the 7960 baseline. "" disables the check. (On a fresh install the check defers to
# after the reboot, with a reminder.)
nvidia_driver_min_version: "595.71.05"
# nvidia-container-toolkit floor (7960 baseline: >= 1.19.1). "" disables the check.
nvidia_container_toolkit_min_version: "1.19.1"

# ---- Portainer (container management web UI) -------------------------------
# Optional MANAGEMENT-PLANE container Ansible deploys so ops can manage the box's
# containers from a browser. It is NOT part of your AI workload stack. It mounts
# the Docker socket (root-equivalent), so treat its port as privileged: restrict it
# to an admin subnet via ai_firewall_allow_ports `from:`, and set a strong admin
# password on first login. Set false to skip.
portainer_enabled: true
portainer_image: "portainer/portainer-ce:lts"   # pin an exact tag for frozen images
portainer_https_port: 9443

# =============================================================================
# AI SERVER FIREWALL  (ai_firewall role -> opens container ports AFTER USG)
# =============================================================================
# USG enables ufw with default-deny inbound, so the ports your prebuilt containers
# publish must be opened explicitly or the stack is unreachable. List them here.
# Each entry: port (required); proto (default tcp); rule ('allow' default, or
# 'limit' to rate-limit a brute-force-sensitive port); from (source CIDR to
# restrict to, '' = anywhere). SSH is always kept open (rate-limited) by the role.
#
# Default exposes only the Open WebUI front-end. For the two-node design, open the
# cross-node ports RESTRICTED to the peer node's IP (uncomment + set the CIDRs):
ai_firewall_allow_ports:
  - { port: 80,  proto: tcp, rule: allow }     # Open WebUI (HTTP)  -> users
  - { port: 443, proto: tcp, rule: allow }     # Open WebUI (HTTPS) -> users
  # ---- System 1 (UI/text-gen) also exposes, to the peer node only: ----
  # - { port: 8000, proto: tcp, rule: allow, from: "10.0.0.0/24" }   # vLLM (text gen)
  # - { port: 5432, proto: tcp, rule: allow, from: "10.0.0.0/24" }   # pgvector
  # ---- System 2 (embeddings/extraction) exposes, to System 1 only: ----
  # - { port: 8001, proto: tcp, rule: allow, from: "10.0.0.10/32" }  # vLLM (embed/vision)
  # - { port: 5001, proto: tcp, rule: allow, from: "10.0.0.10/32" }  # Docling

# =============================================================================
# AI DOCKER COMPOSE  (ai_compose role -> bakes the stack into /opt/it/docker)
# =============================================================================
# ai profile only. Places the node's docker-compose.yaml (+ a root-only .env for
# secrets/site values) under ai_compose_dir, creates the named volumes, and can
# OPTIONALLY bring the stack up. Two node roles share one image set but get
# different compose files:
#   system1 = UI/text-gen   (vLLM 120B + Open WebUI + pgvector + LGTM)
#   system2 = extraction    (Docling + Tika)
#
# HANDS-OFF IMAGING: everything below auto-derives, so a freshly-imaged box
# needs NO site.yml editing -- just give it the right hostname:
#   * enabled by default on the ai profile (every ai box is an AI node);
#   * ai_node_role is picked FROM THE HOSTNAME (dev-ai1->system1, dev-ai2->
#     system2, plus an *ai1*/*ai2* fallback);
#   * the pgvector password + Open WebUI secret key are auto-generated +
#     persisted root-only (used only inside the box, never by a human).
# site.yml is now only for EXCEPTIONS (a differently-named box, a pinned DB
# password for an already-initialised DB, oikb data-source secrets, etc.).
#
# By default the role only PLACES files + creates the (empty) volumes -- it does
# NOT pull/`up`, because the vLLM volume must be loaded with the 120B model first
# (see OPERATIONS.md "Gathering the models"). Flip ai_compose_deploy=true once the
# model is staged to let Ansible pull + `up -d` too.
ai_compose_enabled: true         # every ai-profile box is an AI node
# Hostname -> role map. Name a box dev-ai1/dev-ai2 and it images correctly with
# no per-node config. Extend for more nodes (e.g. dev-ai3: system1).
ai_node_role_by_hostname:
  dev-ai1: system1
  dev-ai2: system2
# Auto-select the role: exact hostname match, else an *ai1*/*ai2* pattern, else
# '' (the role then asserts + tells you to set ai_node_role in site.yml).
ai_node_role: >-
  {{ (ai_node_role_by_hostname[ansible_hostname]
      | default('system1' if ('ai1' in ansible_hostname)
                else ('system2' if ('ai2' in ansible_hostname) else ''))) | trim }}
ai_compose_dir: /opt/it/docker
ai_compose_deploy: false         # true = also `docker compose pull && up -d`
# DB password (System 1 only). Auto-generated + persisted root-only on first
# run, so nothing to type and no secret in the repo. Pin it in site.yml ONLY to
# match an already-initialised pgvector-data volume (e.g. an existing box).
ai_pgvector_password_file: /etc/stig-build/pgvector.pw
ai_pgvector_password: "{{ lookup('ansible.builtin.password', ai_pgvector_password_file + ' length=32 chars=ascii_letters,digits') }}"
# (Open WebUI's connections to System 2's Docling/Tika/embeddings are configured
#  in the Open WebUI admin UI, so no peer IP is needed in the compose/.env.)
# Open WebUI session-signing key (System 1). Auto-generated + persisted root-only
# too -- stable so logins survive re-runs; nothing to type, no secret in the repo.
ai_webui_secret_key_file: /etc/stig-build/webui_secret.key
ai_webui_secret_key: "{{ lookup('ansible.builtin.password', ai_webui_secret_key_file + ' length=64 chars=hexdigits') }}"
# Open WebUI CORS origin (its browser URL). Defaults to '*'; set your domain in
# site.yml (e.g. https://oi.yourlab) to lock it down -- kept out of the repo.
ai_webui_cors_origin: "*"
# oikb (knowledge-base sync) -> Open WebUI + a data source. URL is internal; the
# API key + GitLab token are TRUE secrets, set out-of-band in site.yml (empty =
# oikb stays idle until configured).
ai_oikb_openwebui_url: "http://open-webui:8080"
ai_oikb_openwebui_api_key: ""
ai_oikb_gitlab_url: ""
ai_oikb_gitlab_token: ""
# External named volumes each role owns (kept out of compose's lifecycle so the
# model weights / DB survive `down -v`). Empty list = role creates none.
ai_compose_volumes:
  system1: [vllm, encodings, pgvector-data, open-webui, redis-data, lgtm-data]
  system2: [vllm, encodings]     # vllm/encodings hold embed/vision weights when staged (via hfcli)

# ---- Custom image builds (ai_compose) ---------------------------------------
# Three services use images not on any registry, so ansible builds them ON THE
# BOX during imaging (needs internet: the oikb Dockerfile git-clones at build).
# Set ai_compose_build_images: false to skip (e.g. you push them from a registry).
ai_compose_build_images: true
ai_compose_build_force: false    # true = rebuild even if the tag already exists
ai_compose_images:               # name -> tag + Dockerfile (context copied from the role)
  oikb:    { tag: "oikb:latest",    dockerfile: "oikb.dockerfile" }
  hfcli:   { tag: "hfcli:latest",   dockerfile: "Dockerfile" }
  repomix: { tag: "repomix:latest", dockerfile: "Dockerfile" }
ai_compose_build_by_role:        # which images each node builds
  system1: [oikb, hfcli, repomix]
  system2: [hfcli]

# ---- Model auto-fetch (ai_compose) ------------------------------------------
# Which HuggingFace repo lands in which volume, per node role. The role can
# download these into the (external) volumes so vLLM serves them from disk.
# Only the CURRENTLY-SERVED model is listed (gpt-oss on System 1); the Granite
# chat / embed / vision models are downloaded when you add their vLLM servers --
# stage them any time with the hfcli utility (see OPERATIONS.md), e.g.
#   docker compose run --rm hfcli hf download ibm-granite/granite-4.1-30b --local-dir /llm/granite
# All repos are Apache-2.0 / ungated -- no HF token needed (ai_hf_token only
# dodges anonymous rate-limits on the big gpt-oss pull).
ai_vllm_image: "vllm/vllm-openai:v0.22.1-cu129-ubuntu2404"   # image used by the auto-fetch (has huggingface-cli)
ai_model_fetch: false            # opt-in: download the models below into their volumes (needs internet + disk)
ai_hf_token: ""                  # optional; out-of-band in site.yml, never in repo
# gpt-oss's harmony tokenizer needs these tiktoken files in the `encodings`
# volume, or vLLM crashes building the tokenizer. Fetched alongside the models
# (same ai_model_fetch toggle) for any node whose volumes include `encodings`.
ai_encodings_base_url: "https://openaipublic.blob.core.windows.net/encodings"
ai_encodings_files: ["o200k_base.tiktoken", "cl100k_base.tiktoken"]
ai_models:
  system1:
    - { volume: vllm, repo: "openai/gpt-oss-120b" }
    # Add when you stand up the Granite chat vLLM on System 1:
    # - { volume: granite32b, repo: "ibm-granite/granite-4.1-30b" }
  system2: []
    # Add when you stand up the embed/vision vLLM on System 2:
    # - { volume: granite-embed,  repo: "ibm-granite/granite-embedding-small-english-r2" }
    # - { volume: granite-vision, repo: "ibm-granite/granite-vision-4.1-4b" }

# =============================================================================
# USG HARDENING  (usg_harden role -> Ubuntu Security Guide / DISA-STIG)
# =============================================================================
# BOTH profiles (development and ai) are hardened by Canonical's Ubuntu Security
# Guide (`usg`) applying the DISA-STIG profile. USG ships with Ubuntu Pro, so the
# box must be Pro-ATTACHED first (development needs a Pro token now, just like ai).
# `usg audit` is the compliance report for both. On development, the
# desktop_hardening role runs AFTER USG to re-assert the GUI/RDP and add the
# GNOME/GDM/USB carve-outs USG doesn't cover.
#
# WORKFLOW (all handled by the role, in order):
#   pro attach <token>  ->  pro enable usg [+ fips-updates]  ->  apt install usg
#   ->  usg fix disa_stig   (guarded; see usg_fix_enabled)   ->  usg audit -> report
#
# READ: `usg fix disa_stig` is DISRUPTIVE and, like the DISA profile itself,
# REQUIRES a usable password on an admin account or it can lock you out. It also
# expects a FRESH install -- run it before piling on unrelated services. A REBOOT
# is required afterwards for all controls to take effect. (These are Canonical's
# own warnings for `usg fix`.)

# ---- Ubuntu Pro attach -----------------------------------------------------
# The Pro token is a SECRET -- treat it exactly like the LUKS passphrase above.
# Leave `ubuntu_pro_token` EMPTY in this PUBLIC repo. The role reads the token
# OUT OF BAND from a root-only (0600) file (`ubuntu_pro_token_file`) that
# bootstrap.sh (hidden prompt) or your private seed drops. If the box is already
# attached, or no token is available anywhere, the whole USG step self-skips with
# a POA&M warning rather than failing the build. An inline token is still honoured
# for a PRIVATE/offline repo -- never paste one here.
ubuntu_pro_token: ""
ubuntu_pro_token_file: /etc/ubuntu-advantage/pro-token

# ---- FIPS ------------------------------------------------------------------
# DISA-STIG formally requires FIPS-validated crypto. true => the role runs
# `pro enable fips-updates` (installs the FIPS kernel/modules) and flags a REBOOT.
# ENABLED by fleet decision (closes is_fips_mode_enabled / UBTU-24-600030).
# IMPORTANT: this swaps the running kernel to the FIPS kernel, so:
#   - the `is_fips_mode_enabled` check only passes AFTER a reboot;
#   - validate on a throwaway box first if you run unusual crypto/dev tooling.
# Set false to defer it (then FIPS is a documented POA&M).
usg_enable_fips: true

# ---- USG fix (the disruptive remediation) ----------------------------------
# Mirrors the desktop's `ubtu24stig_disruption_high` safety philosophy. When
# false, the role installs USG and runs `usg audit` (non-destructive, produces the
# report) but does NOT run `usg fix`, so an un-validated box can't lock itself out.
# Flip true once you've validated on a throwaway VM (bootstrap.sh sets it for you
# when you pass HARDEN=1). The role ALSO refuses to run `usg fix` unless a
# sudo-group account has a usable (non-locked) password, as a lockout backstop.
usg_fix_enabled: true
usg_profile: "disa_stig"              # `usg fix/audit <profile>`: disa_stig | cis_level1_server | cis_level2_server
# Re-running `usg fix` on every ansible-pull is slow and needless. The role
# stamps success and skips a re-fix unless the profile changed or you force it.
usg_force_fix: false
# Optional USG tailoring file (customize/relax specific rules). Empty = stock
# profile. Point at a path on the box (e.g. dropped by your seed) to use one.
# NOTE: if you set this, it takes full control of rule selection and the smartcard
# opt-out below is skipped (you decide what to de-select yourself).
usg_tailoring_file: ""

# ---- Smart card / CAC ------------------------------------------------------
# This build is PASSWORD-LOGIN ONLY (smartcard is a documented POA&M). The
# disa_stig profile's "Enable Smart Card Logins in PAM" rule wires pam_pkcs11.so
# into the auth stack, so on a box with NO CAC reader/card every login, sudo, and
# screen-unlock logs:
#     ERROR:pam_pkcs11.c:365: no suitable token available
#     Error 2308: No smart card found.
# Leaving this true makes usg_harden auto-GENERATE a tailoring file from USG's own
# content (`usg generate-tailoring`) and DE-SELECT the rules listed below, so
# `usg fix` never wires up pam_pkcs11 and `usg audit` won't flag them. Set false to
# keep the stock STIG smartcard control (e.g. once you deploy CAC readers + certs).
# IGNORED when usg_tailoring_file is set -- then you control rule selection.
# NOTE: the tailoring only affects FRESH `usg fix` runs. On a box already hardened
# before this was enabled, the pam_pkcs11 line is already in the auth stack (and the
# fix is stamped run-once) -- the usg_remediate role (runs every pull) strips it back
# out automatically (usg_cleanup_pam_pkcs11 below), so no manual step is needed.
#
# The SSSD rules are here too: SSSD provides the CAC certificate->user mapping and
# central-identity backend the STIG expects. This fleet uses LOCAL accounts
# (local_accounts role) with no directory service and no CAC, so those controls are
# not applicable -- de-selecting them is the honest treatment (documented deviation),
# versus enabling an SSSD with no backend that would just fail to start.
usg_disable_smartcard: true
usg_disable_smartcard_rules:
  - smartcard_pam_enabled            # "Enable Smart Card Logins in PAM" (adds pam_pkcs11.so to the auth stack)
  - service_sssd_enabled             # "Enable the SSSD Service" (central identity / CAC cert-mapping backend)
  - sssd_enable_user_cert            # "Enable Certificates Mapping in SSSD" (maps CAC cert -> user)
# USG reports auto-copy to /opt/ia (ia_dir) so the IA team has a single, admin-only
# collection point (see IA/IT MANAGED DIRECTORIES below). The dir + files are owned
# root and group-readable by the admin (sudo) group. Override usg_report_dir to send
# them elsewhere (e.g. back to scap_report_dir / /var/log/stig-scan).
usg_report_dir: "{{ ia_dir }}"
usg_report_dir_owner: root
usg_report_dir_group: "{{ ia_it_group }}"      # admin (sudo) group can read the reports
usg_report_dir_mode: "{{ ia_it_dir_mode }}"    # 2770: setgid, sudo-group rwx, others denied
usg_report_file_group: "{{ ia_it_group }}"
usg_report_file_mode: "0640"                   # root rw, admin group read, others none

# =============================================================================
# USG RESIDUAL REMEDIATION  (usg_remediate role -> runs AFTER USG + the firewall
# roles, both profiles). `usg fix` is stamped run-once and its audit is a snapshot
# taken mid-build (before the firewall roles bring ufw up), so a handful of
# reasonable findings remain open in the report. This role closes the low-risk,
# low-inconvenience ones every pull (idempotent), and can re-run `usg audit` at the
# very end so the report reflects the fully-built box. Deliberately left as POA&M:
# FIPS (kernel swap; usg_enable_fips), UEFI/GRUB boot password (needs a secret),
# audit-log offload (needs a remote collector), SSSD/CAC (de-selected above).
# =============================================================================
usg_remediate_enabled: true

# Strip pam_pkcs11 back out of the PAM stack on already-hardened boxes (fixes the
# "no suitable token available / No smart card found" spam). Tied to the same
# password-only decision as usg_disable_smartcard. SAFE: it only comments out the
# smartcard auth step, never touches pam_unix, so password login cannot be lost.
usg_cleanup_pam_pkcs11: "{{ usg_disable_smartcard }}"

# Fix /var/log file perms (file_permissions_var_log_stig / UBTU-24-700010) and
# /var/log/audit dir mode 0750 (directory_permissions_var_log_audit).
usg_fix_log_permissions: true

# Chrony: the STIG requires a remote time source configured with the `server`
# directive (not `pool`). We write these as `server <host> iburst maxpoll <N>`
# directly into /etc/chrony/chrony.conf and comment out any `pool` lines. Set to
# your enclave's internal NTP server(s); on an isolated net chrony still won't
# reach a public pool, so this MUST be a reachable/approved server. Empty list =
# leave chrony untouched (finding stays a POA&M).
usg_chrony_servers:
  - 10.10.99.100          # enclave NTP server
# Max polling interval the STIG requires on each server line (chronyd_or_ntpd_set_maxpoll,
# UBTU-24-600160/600170): written as `server <host> iburst maxpoll <N>`.
usg_chrony_maxpoll: 16
# makestep line the STIG wants (chronyd_sync_clock, UBTU-24-600180); only applied
# when usg_chrony_servers is non-empty. The DISA remediation inserts exactly
# `makestep 1 -1` (step the clock for any offset, unlimited updates), so match it.
usg_chrony_makestep: "makestep 1 -1"

# Re-run `usg audit` at the very end (after remediation + firewall) so the report
# in usg_report_dir reflects the fully-built, remediated box rather than the
# mid-build snapshot. Only runs when the box is Pro-attached (USG present).
usg_remediate_reaudit: true

# =============================================================================
# COCKPIT  (web server-management console -- BOTH profiles)
# =============================================================================
# Cockpit (https://<host>:9090) is a lightweight web console for systemd units,
# journald logs, storage, networking, updates, and an in-browser terminal. Handy
# for managing a headless AI server or a dev box without a full desktop session.
# It is a PRIVILEGED management surface (root-capable actions), so -- like Portainer
# -- its port is opened RATE-LIMITED and should be restricted to an admin subnet in
# production (set cockpit_allow_from). Set cockpit_enabled: false to skip entirely.
cockpit_enabled: true
cockpit_port: 9090
# Restrict the cockpit port to this source CIDR (e.g. "10.0.0.0/24"); empty = any.
cockpit_allow_from: ""
# Extra cockpit add-on packages to install alongside the base console. Leave as-is
# for the standard set; cockpit-pcp adds historical metrics.
cockpit_extra_packages: []
# TLS cert. Cockpit's built-in cert only covers localhost, so browsing to the box
# by hostname/IP fails cert validation. The role installs a cert covering this
# host's real name + IP:
#   - cockpit_generate_cert (default true): generate a SAN-correct self-signed cert
#     so the browser "proceed anyway" works and the session WebSocket connects.
#   - cockpit_tls_cert / cockpit_tls_key: OPTIONAL org-CA cert (PEM content) dropped
#     in out-of-band (never commit it here) -- clients that trust your CA get NO
#     warning. When set, these take precedence over the generated cert.
cockpit_generate_cert: true
cockpit_cert_days: 825
cockpit_tls_cert: ""
cockpit_tls_key: ""

# =============================================================================
# IA/IT MANAGED DIRECTORIES  (managed_dirs role -> BOTH profiles)
# =============================================================================
# Two admin working areas created on every box:
#   /opt/ia  -- Information Assurance (also the USG report drop, usg_report_dir)
#   /opt/it  -- IT / systems administration
# They are readable/writable ONLY by admins (the `sudo` group) and usable WITHOUT
# a `sudo` prefix: an admin can cd in, create/edit files, and run commands directly.
# Perms: owner root, group ia_it_group, mode 2770 (setgid + group rwx, others none),
# plus a default POSIX ACL so files created inside stay group-accessible even under
# the STIG umask 077. Change ia_it_group to a dedicated admin group if you don't want
# to use `sudo` itself. Set managed_dirs_enabled: false to skip.
managed_dirs_enabled: true
ia_it_group: sudo                 # group allowed into the dirs (Ubuntu admin group)
ia_it_dir_mode: "2770"            # setgid + rwx for the group, nothing for others
ia_dir: /opt/ia
it_dir: /opt/it
managed_dirs:
  - "{{ ia_dir }}"
  - "{{ it_dir }}"
