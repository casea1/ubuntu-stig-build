---
# ansible-pull entrypoint. ansible-pull runs local.yml by default.
#
# TWO PROFILES, selected by `deployment_profile` (group_vars/all.yml, overridable
# with `-e deployment_profile=ai`). Both can run on headless server hardware, and
# BOTH now harden with Canonical's USG (`usg fix disa_stig`); `usg audit` is the
# compliance report for both.
#
#   development (default) -- an engineering workstation. Installs the dev
#     toolchain, then a GNOME desktop + xrdp so users REMOTE IN over RDP for a
#     full GUI (works on a server base with no display). Hardened by USG, then a
#     small desktop_hardening role re-asserts the GUI/RDP and adds the GNOME/GDM
#     and USB carve-outs USG doesn't do. (Needs an Ubuntu Pro token, like ai.)
#
#   ai          -- a headless Ubuntu Pro AI server. Ansible does HOST PREP only
#     (Docker + NVIDIA via ai_stack) and hardens with USG; the AI tools ship as
#     your OWN prebuilt images + compose files. ai_firewall opens their inbound
#     ports after USG's default-deny.
#
# Run order is deliberate for BOTH: install + configure FIRST, harden SECOND.
# Hardening (umask, noexec /tmp, PAM) can break installs/pip if applied first, and
# the AI images / USG content must download while the box is still online.

- name: Build and harden Ubuntu 24.04 (DoD STIG via USG)
  hosts: localhost
  connection: local
  become: true

  # Profile switches, derived once so every role/when below reads cleanly.
  # deployment_profile defaults to 'development'. The first release shipped the
  # names 'desktop'/'server'; they are accepted here as aliases for continuity.
  vars:
    _raw_profile: "{{ deployment_profile | default('development') }}"
    _deployment_profile: "{{ {'desktop': 'development', 'server': 'ai'}.get(_raw_profile, _raw_profile) }}"
    is_development: "{{ _deployment_profile == 'development' }}"
    is_ai: "{{ _deployment_profile == 'ai' }}"

  # Fail fast on a typo'd profile rather than silently building nothing.
  pre_tasks:
    # -------------------------------------------------------------------------
    # PER-NODE / SITE OVERRIDES. Everything pulls the SAME public repo, so
    # per-machine settings (firewall ports, NTP, the peer node's IP, a Cockpit
    # cert, ...) and anything you don't want in a public repo live in a LOCAL file
    # on the box: /etc/stig-build/site.yml (override with -e site_overrides_file=).
    # Dropped out-of-band per node; loaded here so it beats group_vars/all.yml.
    # Example (System 2): ai_firewall_allow_ports: [{port: 5001, proto: tcp, ...}]
    # -------------------------------------------------------------------------
    - name: "Look for a local site-override file"
      ansible.builtin.stat:
        path: "{{ site_overrides_file | default('/etc/stig-build/site.yml') }}"
      register: _site_overrides

    - name: "Load local site/per-node overrides (beats group_vars)"
      ansible.builtin.include_vars: "{{ site_overrides_file | default('/etc/stig-build/site.yml') }}"
      when: _site_overrides.stat.exists

    - name: "Validate deployment_profile is development or ai"
      ansible.builtin.assert:
        that:
          - _deployment_profile in ['development', 'ai']
        fail_msg: >-
          deployment_profile must be 'development' or 'ai'
          (aliases: 'desktop'->development, 'server'->ai). Got '{{ _raw_profile }}'.
        quiet: true

  roles:
    # -------------------------------------------------------------------------
    # BASELINE  -- base_packages runs for both profiles; internally it installs
    # the development app set (when is_development) or a lean AI-server baseline
    # (when is_ai). See roles/base_packages/tasks/main.yml.
    # -------------------------------------------------------------------------
    - role: base_packages    # development: clamav/wireshark/python/editor/putty; ai: lean baseline

    # -------------------------------------------------------------------------
    # SHARED PROVISIONING  (both profiles)
    # Org access groups (dta/audit/sentry) + standing accounts + ACL'd shared
    # folders + USB->dta policy. Runs before hardening so the accounts exist when
    # PAM/faillock is applied. Toggle with local_accounts_enabled.
    # -------------------------------------------------------------------------
    - role: local_accounts          # org users/groups, ACL'd shared folders, USB->dta policy
      when: local_accounts_enabled | default(true)
    - role: managed_dirs            # /opt/ia (USG report drop) + /opt/it, admin-only (sudo group)
      when: managed_dirs_enabled | default(true)
    - role: cockpit                 # web server-management console (9090); firewall opened post-USG
      when: cockpit_enabled | default(true)

    # -------------------------------------------------------------------------
    # DEVELOPMENT-ONLY PROVISIONING  (GUI engineering box, RDP-accessible)
    # -------------------------------------------------------------------------
    - role: app_config              # clamav daemon/freshclam, wireshark group, etc.
      when: is_development
    - role: dev_tools               # compilers/SDKs, /opt/eng-venv, VS Code extensions, docker.io
      when: is_development
    - role: remote_desktop          # GNOME desktop + xrdp (RDP into the dev GUI); runs before hardening
      when: is_development
    - role: classification_banner   # top/bottom security-classification bars (optional)
      when: is_development and (classification_banner_enabled | default(false))

    # -------------------------------------------------------------------------
    # AI-SERVER-ONLY PROVISIONING  (Ubuntu Pro AI server)
    # Runs BEFORE hardening: needs internet (pulls images) and must finish before
    # USG locks the box down.
    # -------------------------------------------------------------------------
    - role: ai_stack                # docker-ce + NVIDIA + selectable Compose stack (vLLM/WebUI/pgvector/Docling)
      when: is_ai

    # -------------------------------------------------------------------------
    # HARDENING  -- BOTH profiles harden with Canonical USG.
    # -------------------------------------------------------------------------
    - role: usg_harden              # Ubuntu Pro attach + `usg fix disa_stig` + `usg audit` -> report
    - role: gpu_fips_module         # ai+FIPS: stage the fips-flavour NVIDIA module so GPUs survive the FIPS kernel swap
      when:
        - is_ai
        - gpu_enabled | default(true)
        - usg_enable_fips | default(false)
    - role: desktop_hardening       # development: GUI-preserving fixups AFTER USG (GNOME/GDM banner, USB, firewall)
      when: is_development
    - role: ai_firewall             # ai: open the prebuilt AI stack's inbound ports AFTER USG's default-deny
      when: is_ai
    - role: ai_compose              # ai: bake the node's docker-compose + .env into /opt/it/docker (opt-in `up`)
      when:
        - is_ai
        - ai_compose_enabled | default(false)

    # -------------------------------------------------------------------------
    # RESIDUAL REMEDIATION  (both profiles) -- runs AFTER USG + the firewall
    # roles. Closes the reasonable findings `usg fix` leaves open (pam_pkcs11
    # cleanup, /var/log perms, chrony server directive, ufw active), then
    # re-runs `usg audit` so the report reflects the fully-built box.
    # -------------------------------------------------------------------------
    - role: usg_remediate           # idempotent residual STIG fixes + smartcard/pam_pkcs11 cleanup + re-audit
      when: usg_remediate_enabled | default(true)

    # -------------------------------------------------------------------------
    # POST-HARDENING  (desktop branding, optional TPM)
    # -------------------------------------------------------------------------
    - role: desktop_branding        # system-wide wallpaper (desktop + lock screen), runs after hardening
      when: is_development
    - role: tpm_luks_unlock         # OPT-IN: bind LUKS to the TPM2 (works on either profile if encrypted)
      when: tpm_luks_enabled | default(false)
