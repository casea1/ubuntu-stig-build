---
# =============================================================================
# ai_stack :: gpu.yml -- NVIDIA GPU support for containers.
#   1. (optional) install the NVIDIA driver on the HOST  (needs a reboot)
#   2. install the nvidia-container-toolkit
#   3. wire the `nvidia` runtime into Docker so containers can request GPUs
# Runs before your container deploy, so restarting Docker here bounces nothing.
# =============================================================================

# ---- 1. Host driver (optional) ---------------------------------------------
- name: "GPU | Is an NVIDIA driver already active? (nvidia-smi)"
  ansible.builtin.command: nvidia-smi
  register: _nvidia_smi
  changed_when: false
  failed_when: false

- name: "GPU | Install the NVIDIA driver"
  when:
    - gpu_install_driver | default(true) | bool
    - _nvidia_smi.rc != 0
  block:
    # PINNED path: install a specific driver branch (needed for very new GPUs /
    # the RTX PRO 6000 Blackwell -open modules and the cu129 vLLM image).
    - name: "GPU | Install the pinned NVIDIA driver ({{ nvidia_driver_package }})"
      ansible.builtin.apt:
        name: "{{ nvidia_driver_package }}"
        state: present
        update_cache: true
      when: (nvidia_driver_package | default('') | length) > 0
      register: _drv_pkg

    # AUTOSELECT path: let ubuntu-drivers pick the recommended driver.
    - name: "GPU | Install ubuntu-drivers-common (autoselect)"
      ansible.builtin.apt:
        name: ubuntu-drivers-common
        state: present
        update_cache: true
        cache_valid_time: 3600
      when: (nvidia_driver_package | default('') | length) == 0

    - name: "GPU | Autoinstall the recommended NVIDIA driver"
      # No-op if the recommended driver is already present. Don't brick the build
      # if there's genuinely no card / no candidate; the version assert below (and
      # vLLM at runtime) will surface a driver that's missing or too old.
      ansible.builtin.command: ubuntu-drivers install
      register: _drv_install
      changed_when: "'is already the newest version' not in _drv_install.stdout"
      failed_when: false
      when: (nvidia_driver_package | default('') | length) == 0

    - name: "GPU | A driver was (re)installed -> a reboot is required"
      ansible.builtin.set_fact:
        ai_stack_reboot_required: true
      when: >-
        (_drv_pkg is defined and _drv_pkg is changed) or
        (_drv_install is defined and not (_drv_install is skipped) and _drv_install.rc == 0)

# ---- 1b. Enforce the driver version floor ----------------------------------
- name: "GPU | Read the active NVIDIA driver version (if the module is loaded)"
  ansible.builtin.command: nvidia-smi --query-gpu=driver_version --format=csv,noheader
  register: _nv_driver_ver
  changed_when: false
  failed_when: false

- name: "GPU | Enforce the NVIDIA driver floor (>= {{ nvidia_driver_min_version }})"
  ansible.builtin.assert:
    that:
      - (_nv_driver_ver.stdout_lines | first | trim) is version(nvidia_driver_min_version, '>=')
    fail_msg: >-
      Active NVIDIA driver {{ _nv_driver_ver.stdout_lines | first | trim }} is older
      than the required {{ nvidia_driver_min_version }} (needed by the cu129 vLLM
      image on the dual RTX 6000 7960). Pin a newer branch via nvidia_driver_package
      (e.g. nvidia-driver-595-server-open) and re-run.
    success_msg: "NVIDIA driver {{ _nv_driver_ver.stdout_lines | first | trim }} satisfies >= {{ nvidia_driver_min_version }}."
    quiet: true
  when:
    - (nvidia_driver_min_version | default('') | length) > 0
    - _nv_driver_ver.rc == 0
    - (_nv_driver_ver.stdout | trim | length) > 0

- name: "GPU | Driver not loaded yet (reboot pending) -- verify the floor after reboot"
  ansible.builtin.debug:
    msg: >-
      Could not read the driver version yet (a fresh driver install needs a REBOOT).
      After rebooting, confirm `nvidia-smi --query-gpu=driver_version --format=csv,noheader`
      reports >= {{ nvidia_driver_min_version }}.
  when:
    - (nvidia_driver_min_version | default('') | length) > 0
    - _nv_driver_ver.rc != 0 or (_nv_driver_ver.stdout | trim | length) == 0

# ---- 2. nvidia-container-toolkit -------------------------------------------
- name: "GPU | Fetch the NVIDIA container-toolkit GPG key (armored)"
  ansible.builtin.get_url:
    url: "{{ nvidia_ct_gpg_url }}"
    dest: /tmp/nvidia-container-toolkit.gpgkey
    mode: "0644"

- name: "GPU | De-armor the key into a keyring"
  ansible.builtin.command: "gpg --dearmor -o {{ nvidia_ct_keyring }} /tmp/nvidia-container-toolkit.gpgkey"
  args:
    creates: "{{ nvidia_ct_keyring }}"

- name: "GPU | Add the NVIDIA container-toolkit apt list"
  ansible.builtin.get_url:
    url: "{{ nvidia_ct_list_url }}"
    dest: "{{ nvidia_ct_list_path }}"
    mode: "0644"

- name: "GPU | Pin the list to our keyring (mirror NVIDIA's sed step)"
  # NVIDIA's published .list has bare `deb https://...`; inject signed-by so apt
  # verifies against the keyring we just installed. Idempotent (re-run matches).
  ansible.builtin.replace:
    path: "{{ nvidia_ct_list_path }}"
    regexp: '^deb https://'
    replace: "deb [signed-by={{ nvidia_ct_keyring }}] https://"

- name: "GPU | Expand the literal $(ARCH) placeholder NVIDIA ships in the .list"
  # apt does NOT perform shell substitution, so the `$(ARCH)` token NVIDIA's list
  # contains would be taken literally and the repo path would 404. Substitute the
  # real dpkg architecture at provisioning time. No-op if a future .list drops it.
  ansible.builtin.replace:
    path: "{{ nvidia_ct_list_path }}"
    regexp: '\$\(ARCH\)'
    replace: "{{ docker_apt_arch }}"

- name: "GPU | Install nvidia-container-toolkit"
  ansible.builtin.apt:
    name: nvidia-container-toolkit
    state: present
    update_cache: true

- name: "GPU | Read the nvidia-container-toolkit version"
  ansible.builtin.command: nvidia-ctk --version
  register: _nvctk_ver
  changed_when: false
  failed_when: false

- name: "GPU | Enforce the nvidia-container-toolkit floor (>= {{ nvidia_container_toolkit_min_version }})"
  ansible.builtin.assert:
    that:
      - (_nvctk_ver.stdout | regex_search('([0-9]+\\.[0-9]+\\.[0-9]+)', '\\1') | first) is version(nvidia_container_toolkit_min_version, '>=')
    fail_msg: >-
      nvidia-container-toolkit is older than the required
      {{ nvidia_container_toolkit_min_version }}. Update it (apt) and re-run.
    quiet: true
  when:
    - (nvidia_container_toolkit_min_version | default('') | length) > 0
    - _nvctk_ver.rc == 0

# ---- 3. Wire the nvidia runtime into Docker --------------------------------
- name: "GPU | Is the nvidia runtime already configured in Docker?"
  ansible.builtin.command: grep -q nvidia /etc/docker/daemon.json
  register: _nv_runtime
  changed_when: false
  failed_when: false

- name: "GPU | Configure Docker to use the nvidia runtime"
  # nvidia-ctk edits /etc/docker/daemon.json to register the runtime. We only run
  # it when not already present, then restart Docker (no containers up yet).
  ansible.builtin.command: nvidia-ctk runtime configure --runtime=docker
  when: _nv_runtime.rc != 0
  changed_when: true          # only reached when the runtime is not yet wired in
  notify: restart docker

# Flush now so Docker is restarted with the nvidia runtime BEFORE any container
# (Portainer, or your GPU workload stack) comes up.
- name: "GPU | Apply the Docker runtime change now"
  ansible.builtin.meta: flush_handlers
