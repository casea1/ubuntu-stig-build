# Security classification level definitions (DoD/CAPCO standard colors).
# Select which level is shown via `classification_banner_level` in
# group_vars/all.yml (it is passed as the argument to the banner).
[DEFAULT]
message = NOT YET CONFIGURED
bgcolor = #ffffff
fgcolor = #000000

[UNCLASSIFIED]
message = UNCLASSIFIED
bgcolor = #007a33
fgcolor = #ffffff

[CUI]
message = CONTROLLED UNCLASSIFIED INFORMATION (CUI)
bgcolor = #502b85
fgcolor = #ffffff

[FOUO]
message = UNCLASSIFIED//FOR OFFICIAL USE ONLY
bgcolor = #007a33
fgcolor = #ffffff

[CONFIDENTIAL]
message = CONFIDENTIAL
bgcolor = #0033a0
fgcolor = #ffffff

[SECRET]
message = SECRET
bgcolor = #c8102e
fgcolor = #ffffff

[TOP SECRET]
message = TOP SECRET
bgcolor = #ff671f
fgcolor = #ffffff

[SCI]
message = TOP SECRET//SCI//NOFORN
bgcolor = #f7ea48
fgcolor = #000000
