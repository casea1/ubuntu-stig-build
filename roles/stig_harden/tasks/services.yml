---
# =============================================================================
# stig_harden :: services.yml
# Time sync (chrony), host firewall (ufw), file-integrity (AIDE), and
# remote-access monitoring (rsyslog).
#
# Pulled in from roles/stig_harden/tasks/main.yml via:
#   - ansible.builtin.include_tasks: services.yml
#
# WHY post-install is safe: this runs in the stig_harden role, AFTER every
# package-install role (base_packages -> app_config -> dev_tools). Nothing
# here installs desktop apps; it only tightens services. None of these edits
# touch PAM, the boot chain, or the GNOME session, so there is no lock-out /
# brick risk in this file.
#
# SSG note: the compliance scan is ComplianceAsCode/SSG
# (xccdf_org.ssgproject.content_profile_stig for ubuntu2404). Each block below
# is written to satisfy the actual oscap *check*, not merely "set it somewhere".
# Verified against ComplianceAsCode content tag v0.1.81 (the pinned
# ssg_content_version in group_vars/all.yml).
# =============================================================================


# -----------------------------------------------------------------------------
# 1) TIME SYNCHRONIZATION  --  chrony in, systemd-timesyncd out
#    SSG rules:
#      - package_chrony_installed   ("The Chrony package is installed")
#      - service_chronyd_enabled    (chrony running + enabled at boot)
#      - service_timesyncd_disabled ("Remove the systemd_timesyncd Service")
#    Ubuntu fact: there is exactly ONE NTP client allowed at a time. Having
#    both chrony and systemd-timesyncd active double-binds UDP/123 and the
#    scan flags timesyncd. We install chrony and *mask* timesyncd (mask, not
#    purge, so a future bare-metal recovery can't silently re-enable it and so
#    we don't yank a systemd-shipped binary).
# -----------------------------------------------------------------------------

- name: "TIME | Install chrony (authoritative NTP client per STIG)"
  # apt is idempotent: a no-op once chrony is present. update_cache with a
  # cache_valid_time avoids a needless index refresh on every pull run.
  ansible.builtin.apt:
    name: chrony
    state: present
    update_cache: true
    cache_valid_time: 3600

- name: "TIME | Stop and MASK systemd-timesyncd so only chrony owns NTP"
  # masking symlinks the unit to /dev/null -> it cannot be started or enabled,
  # which satisfies service_timesyncd_disabled (Ubuntu uses the SSG
  # service_disabled_guard_var template; a masked/disabled unit passes).
  # enabled:false is implied by masked:true; we set both for readability. We do
  # NOT purge the package (it ships with systemd) -- masking is the
  # SSG-accepted remediation.
  ansible.builtin.systemd_service:
    name: systemd-timesyncd
    state: stopped
    enabled: false
    masked: true
  # Don't fail the build if the unit isn't present on a given image variant;
  # a masked-or-absent timesyncd both satisfy the rule. (On some Ubuntu 24.04
  # images systemd-timesyncd is not installed at all.)
  register: timesyncd_mask
  failed_when:
    - timesyncd_mask is failed
    - "'Could not find the requested service' not in (timesyncd_mask.msg | default(''))"

- name: "TIME | Enable and start chrony (unit is 'chrony' on Ubuntu, not 'chronyd')"
  # On Debian/Ubuntu the service unit is chrony.service (chronyd is only the
  # daemon binary). SSG's service_chronyd_enabled carries an Ubuntu override
  # (servicename@ubuntu: chrony), so enabling + starting 'chrony' here is what
  # the oscap check evaluates. Done AFTER timesyncd is masked so the two never
  # race for the socket.
  ansible.builtin.systemd_service:
    name: chrony
    state: started
    enabled: true


# -----------------------------------------------------------------------------
# 2) HOST FIREWALL  --  ufw default-deny + rate-limited inbound services
#    SSG rules:
#      - package_ufw_installed
#      - service_ufw_enabled                 ("Verify ufw Active")
#      - ufw_default_deny_changed / set_default* (deny incoming, allow outgoing)
#      - ufw_rate_limit                      ("ufw Must rate-limit network interfaces")
#    DESKTOP REALITY: a hardened workstation usually exposes NO inbound ports.
#    SSG's rate-limit check is satisfied per-opened-service via `ufw limit`.
#    We expose only what stig_firewall_limit_ports lists (default: ssh) and
#    apply it with `limit` (rate-limited) rather than `allow`. If that list is
#    empty the rule cannot be demonstrated by an opened port -> see POA&M.
# -----------------------------------------------------------------------------

- name: "FW | Install ufw (Uncomplicated Firewall)"
  ansible.builtin.apt:
    name: ufw
    state: present
    update_cache: true
    cache_valid_time: 3600

- name: "FW | Default policy: deny inbound (block everything not explicitly opened)"
  # SSG checks `ufw status verbose` for 'Default: deny (incoming)'. Setting the
  # default first means that even before any allow/limit rules exist the box is
  # closed. community.general.ufw is idempotent on the default policy.
  community.general.ufw:
    direction: incoming
    policy: deny

- name: "FW | Default policy: allow outbound (workstation needs egress: apt, NTP, web)"
  community.general.ufw:
    direction: outgoing
    policy: allow

- name: "FW | Rate-limit each explicitly-opened inbound service (satisfies ufw_rate_limit)"
  # `ufw limit <port>` adds an iptables 'recent' rule that drops a source IP
  # making >6 connections in 30s -- this is precisely the brute-force throttle
  # the SSG rate-limit rule wants to see. We loop the tunable list so an
  # integrator can open/throttle additional services from group_vars without
  # editing this file. Empty list -> loop is a no-op (see POA&M note).
  # community.general.ufw is idempotent on limit rules (incl. the comment), so
  # re-runs report no change.
  community.general.ufw:
    rule: limit
    port: "{{ item.port }}"
    proto: "{{ item.proto | default('tcp') }}"
    comment: "STIG rate-limited inbound ({{ item.port }})"
  loop: "{{ stig_firewall_limit_ports }}"
  loop_control:
    label: "{{ item.port }}/{{ item.proto | default('tcp') }}"

- name: "FW | Enable ufw and persist across reboot (Verify ufw Active)"
  # state: enabled both starts ufw now AND enables ufw.service at boot, which
  # is what service_ufw_enabled / 'Verify ufw Active' check. Run LAST so the
  # policy + limit rules are in place the instant the firewall comes up; this
  # also avoids momentarily blocking our own connection on a remote build.
  community.general.ufw:
    state: enabled


# -----------------------------------------------------------------------------
# 3) FILE INTEGRITY  --  AIDE database + scheduled check
#    SSG rules:
#      - package_aide_installed
#      - aide_build_database          ("Build and Test AIDE Database")
#      - aide_periodic_cron_checking  (a daily integrity check is scheduled)
#    Ubuntu fact: `aideinit` (from aide-common) builds the DB at
#    /var/lib/aide/aide.db.new and you then move it to aide.db. Initial DB
#    build is EXPENSIVE (full-disk hash) -> we guard it with creates: so it
#    runs exactly once per image and is a true no-op on re-runs.
#
#    aide_periodic_cron_checking: SSG ships a dedicated *Ubuntu* OVAL
#    (oval/ubuntu.xml) whose /etc/cron.daily test matches any line beginning
#    with `/usr/bin/aide` (or `aide` / `aide.wrapper`); on Ubuntu that
#    cron.daily test does NOT require --check on the line and the top-level
#    criteria are OR. Our drop-in below begins with /usr/bin/aide, so it
#    satisfies the rule (verified against v0.1.81 oval/ubuntu.xml).
# -----------------------------------------------------------------------------

- name: "AIDE | Install aide + aide-common (provides aideinit, default aide.conf)"
  ansible.builtin.apt:
    name:
      - aide
      - aide-common
    state: present
    update_cache: true
    cache_valid_time: 3600

# AIDE's first `aide --init` hashes the WHOLE filesystem. On this image that
# includes the big engineering trees (/opt/eng-venv, /var/lib/docker, the .NET
# SDK, VS Code), so a SYNCHRONOUS init can run for 30-90+ minutes -- it blocks
# the entire pipeline before the scan and looks exactly like the build has hung.
# (This is what stalls `ansible-pull` at the `aideinit -y -f` line.)
#
# Fix: DECOUPLE the init from the build. We deploy a one-shot systemd service +
# timer that builds the DB a few minutes after the NEXT boot, at idle CPU/IO
# priority, in the background. The build no longer blocks on AIDE at all.
#
# Trade-off: /var/lib/aide/aide.db does not exist during the build-time scan, so
# the SSG "Build and Test AIDE Database" rule shows as a finding on the FIRST
# scan. It passes on any re-scan once the DB has built (a few minutes after the
# post-build reboot). The daily check task below is unchanged.
- name: "AIDE | Deploy the one-time DB-init service (builds aide.db once, post-boot, idle priority)"
  ansible.builtin.copy:
    dest: /etc/systemd/system/aide-init.service
    owner: root
    group: root
    mode: "0644"
    content: |
      [Unit]
      Description=One-time AIDE integrity database initialization (STIG)
      # Only build the DB if it does not already exist -> runs exactly once, and
      # is a no-op on every later boot once /var/lib/aide/aide.db is present.
      ConditionPathExists=!/var/lib/aide/aide.db
      After=multi-user.target
      [Service]
      Type=oneshot
      Nice=19
      IOSchedulingClass=idle
      # aideinit regenerates the config, writes aide.db.new, and -y -f moves it
      # into place as /var/lib/aide/aide.db.
      ExecStart=/usr/sbin/aideinit -y -f

- name: "AIDE | Deploy the timer that fires the init shortly after boot"
  ansible.builtin.copy:
    dest: /etc/systemd/system/aide-init.timer
    owner: root
    group: root
    mode: "0644"
    content: |
      [Unit]
      Description=Run the one-time AIDE init shortly after boot (STIG)
      [Timer]
      OnBootSec=5min
      [Install]
      WantedBy=timers.target

- name: "AIDE | Enable the init timer (DB builds in the background after the next boot)"
  # enabled (not started) on purpose: it activates on the NEXT boot, so the init
  # never runs during this build. daemon_reload picks up the new unit files.
  ansible.builtin.systemd_service:
    name: aide-init.timer
    enabled: true
    daemon_reload: true

- name: "AIDE | Schedule a DAILY integrity check (satisfies aide_periodic_cron_checking)"
  # SSG's Ubuntu OVAL greps /etc/cron.daily/* for a line starting with
  # /usr/bin/aide (aide / aide.wrapper also accepted). A 0755 file in
  # /etc/cron.daily whose FIRST command line begins with /usr/bin/aide is the
  # canonical, idempotent way to satisfy it and matches our 'prefer drop-in
  # config' standard. aide-common already ships /etc/cron.daily/aide, but we
  # OWN a uniquely-named file here so its content is known and the scan
  # reliably matches.
  #
  # IMPORTANT: the aide invocation must be the FIRST token on its own line so
  # the regex (^(?:/usr/bin/)?aide(\.wrapper)?) anchors. We therefore do NOT
  # pipe/redirect inline on the same logical line in a way that would push aide
  # off the line start; the redirection stays after the command on the same
  # line, which the Ubuntu pattern's leading anchor still matches because the
  # line begins with /usr/bin/aide.
  ansible.builtin.copy:
    dest: /etc/cron.daily/aide-stig-check
    mode: "0755"
    owner: root
    group: root
    content: |
      #!/bin/sh
      # Managed by ansible (stig_harden/services.yml) -- do not edit by hand.
      # Daily AIDE file-integrity check. Output is mailed to root by cron and
      # also logged to syslog so it lands in the central log pipeline. The line
      # below MUST start with /usr/bin/aide for SSG aide_periodic_cron_checking.
      /usr/bin/aide --config /etc/aide/aide.conf --check | /usr/bin/logger -t aide -p authpriv.notice 2>&1


# -----------------------------------------------------------------------------
# 4) REMOTE-ACCESS MONITORING  --  rsyslog logs auth/authpriv AND daemon
#    SSG rule:
#      - rsyslog_remote_access_monitoring
#        ("Ensure remote access methods are monitored in Rsyslog")
#
#    CRITICAL (verified against v0.1.81 oval/shared.xml): the OVAL criteria are
#    operator="AND" over THREE facilities -- auth, authpriv, AND daemon. A
#    config that only routes auth/authpriv FAILS the rule. Each facility must
#    appear as its own `<facility>.*` selector routed to a destination. We use
#    the ComplianceAsCode-canonical layout:
#       auth.*       /var/log/secure
#       authpriv.*   /var/log/secure
#       daemon.*     /var/log/messages
#    (We write them as separate per-facility selectors rather than the combined
#    `auth,authpriv.*` form, because the combined form omits `daemon` and the
#    AND criteria require all three -- the single-facility form is also what the
#    regex matches most robustly.)
# -----------------------------------------------------------------------------

- name: "RSYSLOG | Ensure rsyslog is installed (not default on minimal Ubuntu 24.04)"
  # Ubuntu 24.04 can ship journald-only; SSG needs rsyslog present to satisfy
  # the remote-access-monitoring rule's selector check.
  ansible.builtin.apt:
    name: rsyslog
    state: present
    update_cache: true
    cache_valid_time: 3600

- name: "RSYSLOG | Drop-in: route auth/authpriv/daemon (remote-access events) to logs"
  # auth,authpriv carry sshd / login / su / sudo authentication; daemon carries
  # the service-manager events SSG's AND criteria also require. All three
  # selectors are present so the rule's auth-AND-authpriv-AND-daemon test passes.
  #
  # NO validate: here on purpose. The content is three FIXED selector lines (no
  # templating), so it cannot be syntactically invalid. And `rsyslogd -N1 -f %s`
  # against Ansible's staged temp file FAILS with "Permission denied": rsyslogd
  # drops privileges to the 'syslog' user / is AppArmor-confined and cannot read
  # /root/.ansible/tmp/... (unlike sshd, which validates fine). The
  # restart-rsyslog handler reloads the service after this file lands.
  ansible.builtin.copy:
    dest: /etc/rsyslog.d/50-stig-remote-access.conf
    mode: "0640"
    owner: root
    group: root
    content: |
      # Managed by ansible (stig_harden/services.yml).
      # STIG: monitor remote-access (auth) methods. SSG's
      # rsyslog_remote_access_monitoring requires auth.*, authpriv.* AND
      # daemon.* selectors (criteria operator AND), so all three are below.
      auth.*       /var/log/secure
      authpriv.*   /var/log/secure
      daemon.*     /var/log/messages
  notify: restart rsyslog
