---
- name: Install developer toolchain packages (compilers, SDKs, Docker)
  ansible.builtin.apt:
    name: "{{ dev_toolchain_packages }}"
    state: present
    update_cache: true
    cache_valid_time: 3600

- name: Add the developer user to the docker group
  # The docker group is root-equivalent — documented dev-workstation exception.
  # Justify + access-control on the real image.
  ansible.builtin.user:
    name: "{{ dev_tools_user }}"
    groups: docker
    append: true

- name: Ensure the docker service is enabled and running
  ansible.builtin.systemd:
    name: docker
    enabled: true
    state: started
