# =============================================================================
# System 2 (dev-ai2) -- EXTRACTION node
#   Docling (GPU)  +  Apache Tika
# Managed by ansible (ai_compose role); placed in {{ ai_compose_dir }}.
# Reached from System 1's Open WebUI (configured in its admin UI) at
#   http://<THIS_NODE_IP>:5001  (Docling)   and   http://<THIS_NODE_IP>:9998  (Tika)
#   Run:   cd /opt/it/docker && docker compose up -d
#
# The embed/vision vLLM servers are NOT here yet (models can be pre-staged with
# hfcli; add the servers when ready) -- matching the provided compose set.
# NOTE: when you add a vLLM service here, give it the same FIPS carve-out the
# System 1 vLLM uses (host runs FIPS, the image has no FIPS provider):
#   volumes:
#     - ./fips_off:/proc/sys/crypto/fips_enabled:ro
# The ai_compose role already drops a `fips_off` file (content "0") in this dir.
# Utility container (hfcli) is under the `tools` profile (does not auto-start):
#   docker compose run --rm hfcli hf download <repo> --local-dir /llm/<dir>
# =============================================================================
name: ai-system2

networks:
  oi:
    driver: bridge

volumes:
  vllm: { external: true }            # holds embed/vision weights when staged
  encodings: { external: true }

services:
  docling-serve:
    image: ghcr.io/docling-project/docling-serve-cu128:v1.24.0
    container_name: docling-serve
    ports:
      - "5001:5001"
    environment:
      - DOCLING_SERVE_MAX_SYNC_WAIT=6000
      - DOCLING_SERVE_ENABLE_UI=false
      - OMP_NUM_THREADS=4
      - UVICORN_WORKERS=1
    networks: [oi]
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - { driver: nvidia, count: all, capabilities: [gpu] }

  tika:
    image: apache/tika:3.3.1.0
    container_name: tika
    ports:
      - "9998:9998"
    networks: [oi]
    restart: unless-stopped

  # ---- Utility container: model downloads (does NOT auto-start) ----
  # docker compose run --rm hfcli hf download <repo> --local-dir /llm/<dir>
  hfcli:
    image: hfcli:latest         # built on the box by ansible (ai_compose)
    container_name: hfcli
    profiles: ["tools"]
    volumes:
      - vllm:/llm
      - encodings:/encodings
    networks: [oi]
